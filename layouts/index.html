{{ define "main" }}
  <div class="container">
    <h1>{{ .Title | default .Site.Title }}</h1>
    <div class="news-grid">
      {{ range .Paginator.Pages }}
        <article class="post-item">
          <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
          <p>{{ .Summary }}...</p>
        </article>
      {{ end }}
    </div>
    {{ template "_internal/pagination.html" . }}
  </div>
{{ end }}
