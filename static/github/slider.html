<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nepal Cargo - Attractive Slider</title>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .slider-box { width: 100%; max-width: 1100px; margin: 50px auto; border: 10px solid #222; }
        
        /* क्याप्सनको स्टाइल - यो एनिमेसन भएर आउँछ */
        .camera_caption { position: absolute; bottom: 15%; left: 5%; color: #fff; z-index: 10; }
        .camera_caption > div { 
            background: rgba(255, 133, 27, 0.9); 
            padding: 15px 30px; 
            font-size: 28px; 
            font-weight: bold;
            border-radius: 5px;
        }

        /* बटन र नेभिगेसन */
        .camera_prev, .camera_next { background: #444; width: 40px; height: 40px; cursor: pointer; }
        .camera_prev:hover, .camera_next:hover { background: #ff851b; }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.3/jquery.easing.1.3.min.js"></script>
    
    <script src="file:///C:/Users/DELL/Desktop/github/camera-slider.js"></script>
</head>
<body>

    <div class="slider-box">
        <div class="camera_wrap" id="cargo_slider">
            
            <div data-src="https://placehold.co/1100x450/0074D9/white?text=Mosaic+Animation" data-fx="mosaic">
                <div class="camera_caption fadeFromLeft">
                    <div>Smart Cargo Solutions</div>
                </div>
            </div>

            <div data-src="https://placehold.co/1100x450/2ECC40/white?text=Curtain+Effect" data-fx="blindCurtainTopLeft">
                <div class="camera_caption fadeFromBottom">
                    <div>Fast Customs Clearing</div>
                </div>
            </div>

            <div data-src="https://placehold.co/1100x450/FF851B/white?text=Stampede+Effect" data-fx="stampede">
                <div class="camera_caption fadeIn">
                    <div>Secure Transportation</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        $(function(){
            // Multi-function Slider Controller
            var SliderController = {
                // १. स्लाइडर कन्फिगर गर्ने फङ्सन
                getOptions: function() {
                    return {
                        height: '450px',
                        loader: 'bar',
                        pagination: true,
                        thumbnails: false,
                        hover: true,
                        // 'random' ले सबै आकर्षक एनिमेसन पालैपालो देखाउँछ
                        fx: 'random', 
                        time: 4000,           // फोटो रहने समय
                        transPeriod: 1500,    // एनिमेसन हुने समय (१.५ सेकेन्ड)
                        onLoaded: function() {
                            console.log("Camera Slider is initialized successfully!");
                        }
                    };
                },

                // २. स्लाइडर सुचारु गर्ने फङ्सन
                start: function() {
                    if ($.isFunction($.fn.camera)) {
                        $('#cargo_slider').camera(this.getOptions());
                    } else {
                        alert("Error: camera-slider.js फाइल भेटिएन। कृपया फाइल पाथ चेक गर्नुहोस्।");
                    }
                }
            };

            // स्लाइडर चलाउने
            SliderController.start();
        });
    </script>
</body>
</html>
