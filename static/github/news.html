<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelamb - Universal AI News Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&display=swap');
        
        body { font-family: 'Mukta', sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f6; color: #333; margin: 0; }
        
        /* Multi-function Navbar */
        .navbar { background: #002e5b; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .navbar input { flex-grow: 1; padding: 10px; border-radius: 6px; border: none; font-family: 'Mukta', sans-serif; outline: none; font-size: 14px; }
        .btn-fetch { background: #ed1c24; color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; white-space: nowrap; }
        .btn-fetch:hover { background: #c1121b; }

        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        h1 { color: #ed1c24; font-size: 26px; font-weight: 700; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .image-container { position: relative; margin-bottom: 25px; text-align: center; }
        .comic-frame { border: 6px solid #222; padding: 0; background: #fff; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); display: inline-block; max-width: 100%; border-radius: 4px; overflow: hidden; box-sizing: border-box; }
        .comic-frame img { width: 1200px; height: 700px; max-width: 100%; object-fit: cover; display: block; border: none; }
        
        .content-area { white-space: pre-wrap; font-size: 18px; text-align: justify; background: #fafafa; padding: 20px; border-radius: 10px; border: 1px solid #eee; min-height: 200px; color: #444; }
        
        .nav-buttons { display: flex; gap: 8px; margin-top: 30px; flex-wrap: wrap; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); position: sticky; bottom: 10px; z-index: 100; border: 1px solid #ddd; justify-content: center; align-items: center; }
        
        button, select { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; font-family: 'Mukta', sans-serif; font-size: 14px; transition: 0.3s; }
        
        .btn-nav { background: #002e5b; color: white; }
        .btn-image { background: #ed1c24; color: white; flex-grow: 1; }
        .btn-translate { background: #ff5722; color: white; }
        .btn-copy { background: #28a745; color: white; }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        select { background: #eee; color: #333; border: 1px solid #ccc; outline: none; }

        #loader { display: none; text-align: center; padding: 20px; background: #fff; border: 2px solid #ed1c24; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.2); width: 280px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ed1c24; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="status-text">प्रक्रिया हुँदैछ...</div>
</div>

<div class="container">
    <div class="navbar">
        <input type="text" id="site-url" placeholder="WP JSON, Blogger URL वा RSS Feed Link राख्नुहोस्">
        <button class="btn-fetch" onclick="fetchData()">डाटा फेच गर्नुहोस्</button>
    </div>

    <div id="content-body">
        <span class="label">समाचार शीर्षक:</span>
        <h1 id="news-title">वेबसाइटको लिङ्क हालेर सुरु गर्नुहोस्...</h1>
        <div id="image-area" class="image-container"></div>
        <span class="label">समाचार सामग्री:</span>
        <div class="content-area" id="news-text"></div>
    </div>
</div>

<div class="nav-buttons">
    <button class="btn-nav" onclick="changePost(-1)">←</button>
    <button class="btn-nav" onclick="changePost(1)">→</button>
    
    <select id="lang-select">
        <option value="hi">हिन्दी (Hindi)</option>
        <option value="bho">भोजपुरी (Bhojpuri)</option>
        <option value="en">English</option>
    </select>
    <button class="btn-translate" onclick="translateWithGoogle()">अनुवाद</button>

    <select id="image-style-select">
        <option value="comic">Comic Style (Doga/Manu Art)</option>
        <option value="uploaded_style">Clear Lines & Soft Colors (Modern)</option>
        <option value="photo">Real Photo (Photorealistic)</option>
        <option value="cartoon">Vibrant Cartoon (Colorful)</option>
    </select>
    
    <select id="image-model-select">
        <option value="flux">Hugging Face (Flux) - Best</option>
        <option value="pollinations">Pollinations FREE</option>
        <option value="dalle">DALL-E 3 (OpenAI)</option>
        <option value="gemini">Gemini AI Art (Hybrid)</option>
    </select>
    
    <button id="i-btn" class="btn-image" onclick="generateAIImage()">🎨 सान्दर्भिक चित्र बनाउनुहोस्</button>
    
    <button class="btn-copy" onclick="copyText()">कपि</button>
</div>

<script>
    const OPENAI_API_KEY = "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"; 
    const GEMINI_API_KEY = "AIzaSyBNWjPUmKWnHcdlQrvAq7qRSKOdIt1APcM"; 

    let posts = [];
    let currentIndex = 0;

    // अङ्कहरूलाई नेपाली/देवनागरीमा बदल्ने फङ्सन
    function convertNumbersToNepali(text) {
        const numbers = {
            '0': '०', '1': '१', '2': '२', '3': '३', '4': '४',
            '5': '५', '6': '६', '7': '७', '8': '८', '9': '९'
        };
        return text.replace(/[0-9]/g, function(w) {
            return numbers[w];
        });
    }

    async function fetchData() {
        let inputUrl = document.getElementById('site-url').value.trim();
        if (!inputUrl) inputUrl = "https://dev-webdesignnepal.pantheonsite.io";
        
        showLoader("स्रोत पहिचान गरी डाटा फेच गर्दैछ...");

        try {
            let apiUrl = "";
            let fetchType = "wp";

            if (inputUrl.includes("blogspot.com")) fetchType = "blogger";
            else if (inputUrl.includes("/feed") || inputUrl.includes(".xml") || inputUrl.includes("rss")) fetchType = "rss";

            if (fetchType === "blogger") {
                apiUrl = `${inputUrl.replace(/\/$/, "")}/feeds/posts/default?alt=json&max-results=50`;
            } else if (fetchType === "rss") {
                apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(inputUrl)}`;
            } else {
                apiUrl = `${inputUrl.replace(/\/$/, "")}/wp-json/wp/v2/posts?_embed&per_page=50`;
            }

            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error("डेटा प्राप्त गर्न सकिएन।");
            const data = await response.json();

            if (fetchType === "blogger") {
                posts = data.feed.entry.map(e => ({
                    title: e.title.$t,
                    content: e.content ? e.content.$t : e.summary.$t,
                    image: e.media$thumbnail ? e.media$thumbnail.url.replace('/s72-c/', '/s1600/') : 'https://via.placeholder.com/1200x700?text=Neelamb'
                }));
            } else if (fetchType === "rss") {
                posts = data.items.map(i => ({
                    title: i.title,
                    content: i.content || i.description,
                    image: i.enclosure.link || i.thumbnail || 'https://via.placeholder.com/1200x700?text=Neelamb'
                }));
            } else {
                posts = data.map(p => ({
                    title: p.title.rendered,
                    content: p.content.rendered,
                    image: p._embedded?.['wp:featuredmedia']?.[0]?.source_url || 'https://via.placeholder.com/1200x700?text=Neelamb'
                }));
            }

            currentIndex = 0;
            renderPost();
        } catch (error) {
            alert("त्रुटि: डाटा तान्न सकिएन।");
        }
        hideLoader();
    }

    function renderPost() {
        if (!posts.length) return;
        const post = posts[currentIndex];
        document.getElementById('news-title').innerHTML = post.title;
        document.getElementById('news-text').innerText = cleanHTML(post.content);
        document.getElementById('image-area').innerHTML = `<div class="comic-frame"><img src="${post.image}"></div>`;
        resetImageButton();
    }

    function cleanHTML(html) { return new DOMParser().parseFromString(html, 'text/html').body.textContent || ""; }

    async function translateWithGoogle() {
        const lang = document.getElementById('lang-select').value;
        const titleEl = document.getElementById('news-title');
        const textEl = document.getElementById('news-text');
        showLoader("अनुवाद हुँदैछ...");
        try {
            const getUrl = (q) => `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ne&tl=${lang}&dt=t&q=${encodeURIComponent(q)}`;
            
            // शीर्षक अनुवाद र अङ्क परिवर्तन
            const resT = await fetch(getUrl(titleEl.innerText));
            const dataT = await resT.json();
            titleEl.innerText = convertNumbersToNepali(dataT[0][0][0]);

            // सामग्री अनुवाद र अङ्क परिवर्तन
            const chunks = textEl.innerText.match(/[\s\S]{1,500}/g) || [];
            let fullText = "";
            for (let c of chunks) {
                const res = await fetch(getUrl(c));
                const d = await res.json();
                if (d[0]) d[0].forEach(p => { if (p[0]) fullText += p[0]; });
            }
            textEl.innerText = convertNumbersToNepali(fullText);
            
        } catch (e) { alert("Translation Failed"); }
        hideLoader();
    }

    async function generateAIImage() {
        const model = document.getElementById('image-model-select').value;
        const styleChoice = document.getElementById('image-style-select').value;
        const title = document.getElementById('news-title').innerText;
        const content = document.getElementById('news-text').innerText.substring(0, 400);

        let masterStyle = "";
        if (styleChoice === 'comic') masterStyle = "Raj Comics style, bold inking, dramatic, vibrant action colors,";
        else if (styleChoice === 'uploaded_style') masterStyle = "High-quality comic illustration, thin clear outlines, soft coloring, aesthetic,";
        else if (styleChoice === 'photo') masterStyle = "Hyper-realistic photo, 8k, cinematic news photography, sharp focus,";
        else if (styleChoice === 'cartoon') masterStyle = "Vibrant 3D cartoon style, Pixar inspired, clean lines, colorful,";

        showLoader(`एआईले समाचार बुझ्दैछ...`);
        document.getElementById('i-btn').disabled = true;

        try {
            const gRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Create a descriptive visual scene prompt in English for image generation. Title: "${title}". Summary: "${content}". Return only the prompt.` }] }] })
            });
            const gData = await gRes.json();
            let aiPrompt = gData.candidates ? gData.candidates[0].content.parts[0].text : title;

            let finalPrompt = `${masterStyle} ${aiPrompt}`;
            let imageUrl = "";

            if (model === 'dalle') {
                const response = await fetch("https://api.openai.com/v1/images/generations", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENAI_API_KEY}` },
                    body: JSON.stringify({ model: "dall-e-3", prompt: finalPrompt, n: 1, size: "1024x1024" })
                });
                const d = await response.json();
                imageUrl = d.data[0].url;
            } else {
                const modelType = (model === 'flux') ? 'flux' : 'turbo';
                imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=1200&height=700&nologo=true&seed=${Math.random()}&model=${modelType}`;
            }

            displayImage(imageUrl);
        } catch (e) {
            alert("Error: " + e.message);
            hideLoader();
            resetImageButton();
        }
    }

    function displayImage(url) {
        const area = document.getElementById('image-area');
        const img = new Image();
        img.src = url;
        img.onload = () => {
            area.innerHTML = `<div class="comic-frame"><img src="${url}"></div>`;
            hideLoader();
            resetImageButton("✅ चित्र तयार!");
        };
        img.onerror = () => { hideLoader(); resetImageButton(); alert("Image failed."); };
    }

    function showLoader(m) { document.getElementById('status-text').innerText = m; document.getElementById('loader').style.display = 'block'; }
    function hideLoader() { document.getElementById('loader').style.display = 'none'; }
    function resetImageButton(t = "🎨 सान्दर्भिक चित्र बनाउनुहोस्") { const b = document.getElementById('i-btn'); b.disabled = false; b.innerText = t; }
    function changePost(s) { if(posts.length > 0) { currentIndex = (currentIndex + s + posts.length) % posts.length; renderPost(); window.scrollTo(0,0); } }
    function copyText() { navigator.clipboard.writeText(document.getElementById('news-text').innerText); alert("समाचार कपि भयो!"); }

    fetchData();
</script>

</body>
</html>
