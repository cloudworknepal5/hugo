<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>फेमस नेपाल सन्देश साप्ताहिक</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f9f9f9; }

        /* १. टाइटल बार स्टाइल */
        .custom-title-bar {
            display: flex; align-items: center; text-align: center;
            margin: 40px auto 20px auto; max-width: 1400px; padding: 0 15px;
        }
        .custom-title-bar::before, .custom-title-bar::after {
            content: ''; flex: 1; border-bottom: 2px solid #000;
        }
        .custom-title-bar span {
            padding: 0 20px; font-size: 26px; font-weight: bold; color: #000; 
            white-space: nowrap; font-family: sans-serif;
        }

        /* २. ग्यालरी कन्टेनर */
        .drive-page-container { max-width: 1400px; margin: 0 auto; font-family: sans-serif; }

        /* ३. ग्रिड ग्रुप (डेस्कटप लेआउट सुरक्षित राख्न) */
        .grid-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            grid-auto-rows: minmax(250px, auto);
            grid-gap: 15px;
            margin-bottom: 15px;
        }

        /* प्रत्येक ९ वटाको सेटमा पहिलो कार्डलाई ठूलो बनाउने */
        .grid-group .drive-card:first-child {
            grid-row: span 2;
        }

        .drive-card {
            background: #fff; border: 1px solid #333; display: flex;
            flex-direction: column; position: relative; overflow: hidden;
            text-decoration: none; color: inherit; transition: transform 0.2s;
        }
        
        .drive-card:hover { transform: scale(1.01); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .thumb-wrapper { width: 100%; height: 100%; position: relative; min-height: 200px; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* फाइल नेम ओभरले */
        .file-name-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.7); color: white; padding: 10px;
            font-size: 14px; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ४. लोड मोर बटन र म्यासेज */
        .btn-container { text-align: center; margin: 30px 0; }
        #load-more-btn {
            padding: 12px 30px; cursor: pointer; background: #28a745; color: #fff;
            border: none; border-radius: 5px; font-size: 16px; display: none;
        }
        #status-msg { text-align: center; padding: 20px; font-weight: bold; }

        /* ५. रेस्पोन्सिभ (मोबाइलको लागि) */
        @media (max-width: 1000px) {
            .grid-group { grid-template-columns: 1fr 1fr; }
            .grid-group .drive-card:first-child { grid-column: span 2; }
            .custom-title-bar span { font-size: 18px; padding: 0 10px; }
        }
    </style>
</head>
<body>

<div class="drive-page-container">
    <div class="custom-title-bar">
        <span>फेमस नेपाल सन्देश साप्ताहिक पढ्नुहोस्</span>
    </div>

    <div id="main-gallery-container"></div>
    
    <div class="btn-container">
        <button id="load-more-btn" onclick="handleLoadMore()">थप फाइलहरू हेर्नुहोस्</button>
    </div>
    <div id="status-msg">कृपया पर्खनुहोस्, लोड हुँदैछ...</div>
</div>

<script>
/**
 * Multi-function Script Logic [cite: 2026-01-07]:
 * १. fetchAndInit: API बाट डाटा तान्ने र सुरु गर्ने।
 * २. sortFiles: भर्खरै अपलोड भएका फाइलहरूलाई पहिलो प्राथमिकतामा राख्ने।
 * ३. createCardHTML: प्रत्येक फाइलको लागि कार्ड बनाउने।
 * ४. renderBatch: ९-९ वटाको ग्रिड ग्रुप बनाएर डिस्प्ले गर्ने।
 */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaBFiBhFM-V3bZd5i3QRPEs1P1Md9GMJ-f5GzXrlaW7ZGNLjI6Z7PPikc1i0HZ-5vg/exec";
let allFiles = []; 
let displayedCount = 0; 
const BATCH_SIZE = 9; 

async function fetchAndInit() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        // नयाँ फाइल पहिले देखाउन Sort गर्ने (Newest First) [cite: 2026-01-07]
        allFiles = data.sort((a, b) => {
            return new Date(b.createdTime || b.date) - new Date(a.createdTime || a.date);
        });

        document.getElementById('status-msg').style.display = 'none';
        renderBatch(); 
    } catch (err) {
        document.getElementById('status-msg').innerHTML = "डाटा लोड गर्न सकिएन। कृपया रिफ्रेस गर्नुहोस्।";
    }
}

function createCardHTML(file) {
    return `
        <a href="${file.url}" target="_blank" class="drive-card">
            <div class="thumb-wrapper">
                <img src="https://drive.google.com/thumbnail?id=${file.id}&sz=w1000" alt="${file.name}" loading="lazy">
                <div class="file-name-overlay">${file.name}</div>
            </div>
        </a>
    `;
}

function renderBatch() {
    const mainContainer = document.getElementById('main-gallery-container');
    const nextBatch = allFiles.slice(displayedCount, displayedCount + BATCH_SIZE);
    
    if (nextBatch.length > 0) {
        // नयाँ ग्रिड ग्रुप बनाउने जसले डेस्कटपको लेआउट बिग्रन दिँदैन
        const groupDiv = document.createElement('div');
        groupDiv.className = 'grid-group';
        
        let batchHTML = '';
        nextBatch.forEach(file => {
            batchHTML += createCardHTML(file);
        });
        
        groupDiv.innerHTML = batchHTML;
        mainContainer.appendChild(groupDiv);
    }

    displayedCount += nextBatch.length;
    updateButtonVisibility();
}

function updateButtonVisibility() {
    const btn = document.getElementById('load-more-btn');
    btn.style.display = (displayedCount < allFiles.length) ? 'inline-block' : 'none';
}

function handleLoadMore() {
    renderBatch();
}

// ग्यालरी सुरु गर्ने
fetchAndInit();
</script>

</body>
</html>
