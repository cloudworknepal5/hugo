<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Res PDF Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .canvas-preview canvas { width: 100% !important; border-radius: 12px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                PDF to JPG <span class="text-red-500">High-Res</span>
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass p-4 rounded-2xl flex items-start gap-4">
                <div class="flex-shrink-0 w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-lg font-bold">1</div>
                <div>
                    <h3 class="font-bold text-sm">Upload</h3>
                    <p class="text-xs text-slate-400">Select PDF to process pages in 300 DPI.</p>
                </div>
            </div>
            <div class="glass p-4 rounded-2xl flex items-start gap-4">
                <div class="flex-shrink-0 w-8 h-8 bg-red-600 text-white flex items-center justify-center rounded-lg font-bold">2</div>
                <div>
                    <h3 class="font-bold text-sm">Download</h3>
                    <p class="text-xs text-slate-400">Click red buttons for single or ZIP files.</p>
                </div>
            </div>
            <div class="glass p-4 rounded-2xl flex items-start gap-4">
                <div class="flex-shrink-0 w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-lg font-bold">3</div>
                <div>
                    <h3 class="font-bold text-sm">Share</h3>
                    <p class="text-xs text-slate-400">Extract ZIP and share high-res images.</p>
                </div>
            </div>
        </div>

        <div class="glass rounded-3xl p-6 text-center mb-10 shadow-2xl">
            <div class="flex flex-wrap items-center justify-center gap-4">
                <label class="flex items-center px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl cursor-pointer transition-all active:scale-95 shadow-lg">
                    <span>Select PDF File</span>
                    <input type="file" id="pdf-in" accept="application/pdf" class="hidden" />
                </label>
                <button id="zip-out" class="hidden glow-red flex items-center px-8 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-all active:scale-95">
                    <span>Download All (ZIP)</span>
                </button>
            </div>
            <div id="status" class="mt-4 text-blue-400 font-semibold text-sm h-4"></div>
        </div>

        <div id="grid" class="grid grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const input = document.getElementById('pdf-in');
        const grid = document.getElementById('grid');
        const zipBtn = document.getElementById('zip-out');
        const status = document.getElementById('status');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let imgStore = [];

        input.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            grid.innerHTML = ''; imgStore = []; zipBtn.classList.add('hidden');
            status.innerText = "Processing PDF...";

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                    status.innerText = `Rendering ${pdf.numPages} Pages...`;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 3.0 });
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                        const data = canvas.toDataURL('image/png');
                        imgStore.push({ name: `Page_${i}.png`, data: data });

                        const card = document.createElement('div');
                        card.className = "glass p-3 rounded-2xl flex flex-col shadow-lg";
                        const wrap = document.createElement('div');
                        wrap.className = "canvas-preview mb-3";
                        wrap.appendChild(canvas);
                        const btn = document.createElement('button');
                        btn.className = "mt-auto w-full py-2 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 text-[10px] uppercase tracking-wider transition-all";
                        btn.innerText = `Save Page ${i}`;
                        btn.onclick = () => { const a = document.createElement('a'); a.href = data; a.download = `Page_${i}.png`; a.click(); };
                        card.appendChild(wrap); card.appendChild(btn); grid.appendChild(card);
                    }
                    status.innerText = "Complete!"; zipBtn.classList.remove('hidden');
                } catch (err) { status.innerText = "Error processing file."; }
            };
            reader.readAsArrayBuffer(file);
        });

        zipBtn.addEventListener('click', () => {
            const zip = new JSZip();
            imgStore.forEach(img => zip.file(img.name, img.data.split(',')[1], { base64: true }));
            zip.generateAsync({ type: "blob" }).then(c => saveAs(c, "High_Res_Export.zip"));
        });
    </script>
</body>
</html>
