<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        .canvas-preview canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body class="bg-transparent">

    <div class="max-w-6xl mx-auto py-6">
        
        <div class="flex flex-wrap items-center justify-center gap-4 mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            
            <label class="flex items-center px-6 py-3 bg-blue-600 text-white font-bold rounded-xl cursor-pointer hover:bg-blue-700 transition-all active:scale-95 shadow-md">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                <span>Select PDF</span>
                <input type="file" id="pdf-input" accept="application/pdf" class="hidden" />
            </label>

            <button id="btn-zip-all" class="hidden flex items-center px-6 py-3 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-600 transition-all active:scale-95 shadow-md">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                <span>Download ZIP</span>
            </button>

            <span id="status-text" class="text-sm font-medium text-gray-500 italic"></span>
        </div>

        <div id="image-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
        
    </div>

    <script>
        const pdfInput = document.getElementById('pdf-input');
        const imageGrid = document.getElementById('image-grid');
        const btnZipAll = document.getElementById('btn-zip-all');
        const statusText = document.getElementById('status-text');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let masterImageStore = [];

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            imageGrid.innerHTML = '';
            masterImageStore = [];
            btnZipAll.classList.add('hidden');
            statusText.innerText = "Processing...";

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    
                    statusText.innerText = `Converting ${pdf.numPages} Pages...`;

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 3.0 }); 
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        await page.render({ canvasContext: context, viewport: viewport }).promise;

                        const imgData = canvas.toDataURL('image/png');
                        masterImageStore.push({ name: `Page_${i}.png`, data: imgData });

                        // Build Card
                        const card = document.createElement('div');
                        card.className = "bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-col";
                        
                        const preview = document.createElement('div');
                        preview.className = "canvas-preview mb-3 rounded-lg overflow-hidden shadow-inner border border-gray-50";
                        preview.appendChild(canvas);
                        
                        const dlBtn = document.createElement('button');
                        dlBtn.className = "w-full py-2 bg-gray-100 text-gray-800 font-bold rounded-lg hover:bg-blue-600 hover:text-white transition-all text-xs uppercase tracking-wider";
                        dlBtn.innerText = `Save Page ${i}`;
                        
                        dlBtn.onclick = () => {
                            const link = document.createElement('a');
                            link.href = imgData;
                            link.download = `Page_${i}.png`;
                            link.click();
                        };

                        card.appendChild(preview);
                        card.appendChild(dlBtn);
                        imageGrid.appendChild(card);
                    }

                    statusText.innerText = "Done!";
                    btnZipAll.classList.remove('hidden');
                } catch (err) {
                    statusText.innerText = "Error encountered.";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        btnZipAll.addEventListener('click', () => {
            const zip = new JSZip();
            masterImageStore.forEach(item => {
                const base64Data = item.data.split(',')[1];
                zip.file(item.name, base64Data, { base64: true });
            });
            zip.generateAsync({ type: "blob" }).then(content => {
                saveAs(content, "PDF_Export.zip");
            });
        });
    </script>
</body>
</html>
