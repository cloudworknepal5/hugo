<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap');
    
    .sidebar-wrapper { font-family: 'Mukta', sans-serif; max-width: 100%; background: #ffffff; padding: 15px; border-radius: 12px; box-sizing: border-box; margin: 10px auto; border: 1px solid #ddd; }

    /* а§Яа§™ а§Ха§®а•На§Яа•На§∞а•Ла§≤ */
    .sb-controls { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
    #sb-search-input { flex: 1; padding: 10px 20px; border-radius: 30px; border: 2px solid #cc0000; outline: none; font-size: 16px; }
    #sb-download-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 700; cursor: pointer; }

    .sb-logo-area { text-align: center; margin-bottom: 10px; }
    .sb-main-logo { width: 280px; max-width: 85%; }

    /* а§Па§∞а§ња§ѓа§Њ а§єа•За§°а§≤а§Ња§За§® - а§Єа•На§™а§Ја•На§Я а§µа§ња§≠а§Ња§Ьа§®а§Ха§Њ а§≤а§Ња§Ча§њ */
    .sb-area-header { display: flex; align-items: center; text-align: center; margin: 40px 0 20px; position: relative; }
    .sb-area-header::before, .sb-area-header::after { content: ""; flex: 1; border-bottom: 3px solid #cc0000; }
    .sb-area-name { background: #cc0000; color: #fff; padding: 8px 35px; font-size: 22px; font-weight: 800; border-radius: 50px; margin: 0 15px; white-space: nowrap; box-shadow: 0 4px 10px rgba(204,0,0,0.2); }

    /* а§Йа§Ѓа•На§Ѓа•За§¶а§µа§Ња§∞ а§Ча•На§∞а§ња§° */
    .sb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; margin-bottom: 30px; }
    .sb-card { background: #fff; border: 1.5px solid #cc0000; border-radius: 10px; overflow: hidden; position: relative; display: flex; flex-direction: column; transition: transform 0.2s; }
    
    .sb-img-box { position: relative; width: 100%; height: 380px; overflow: hidden; background: #f0f0f0; }
    .sb-img { width: 100%; height: 100%; object-fit: cover; }
    
    .sb-lead-tag { position: absolute; top: 10px; left: 10px; background: #27ae60; color: #fff; padding: 2px 12px; font-size: 13px; font-weight: 800; border-radius: 4px; z-index: 5; }
    .sb-badge { position: absolute; right: 10px; bottom: 10px; width: 50px; height: 50px; background: #fff; border: 2px solid #cc0000; border-radius: 50%; padding: 4px; display: flex; align-items: center; justify-content: center; z-index: 5; }
    .sb-badge img { width: 90%; height: 90%; object-fit: contain; }

    .sb-info { padding: 12px 5px; text-align: center; }
    .sb-name { font-size: 20px; font-weight: 800; color: #1a1a1a; margin-bottom: 2px; }
    .sb-party { font-size: 15px; font-weight: 700; color: #cc0000; margin-bottom: 8px; }
    
    .sb-votes-box { background: #2c3e50; color: #fff; font-size: 14px; font-weight: 700; padding: 6px; border-radius: 6px; width: 90%; margin: 0 auto; }

    @media (max-width: 768px) {
        .sb-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .sb-img-box { height: 260px; }
        .sb-area-name { font-size: 18px; padding: 6px 20px; }
    }
    #sb-load-btn { background: #2c3e50; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 30px; font-weight: 800; cursor: pointer; margin-top: 20px; }
</style>

<div class="sidebar-wrapper" id="capture-area">
    <div class="sb-controls">
        <input type="text" id="sb-search-input" placeholder="а§Ца•Ла§Ьа•На§®а•Ба§єа•Ла§Єа•Н..." oninput="sbMultiHandler('filter')">
        <button id="sb-download-btn" onclick="downloadPNG()">Download PNG</button>
    </div>
    <div class="sb-logo-area" id="logo-container"></div>
    <div id="sb-portal">а§°а§Ња§Яа§Њ а§≤а•Ла§° а§єа•Ба§Ба§¶а•Иа§Ы...</div>
    <button id="sb-load-btn" onclick="sbMultiHandler('more')">а§•а§™ а§®а§ња§∞а•На§µа§Ња§Ъа§® а§Ха•На§Ја•За§§а•На§∞а§єа§∞а•В</button>
</div>

<script>
let sbRaw = []; let sbActive = []; let sbLimit = 1;

function parseVotes(str) {
    if(!str) return 0;
    let clean = str.split('|')[0].replace(/[^0-9]/g, '');
    return parseInt(clean) || 0;
}

function getProxyUrl(url) { return url ? "https://images.weserv.nl/?url=" + encodeURIComponent(url.replace(/https?:\/\//, "")) : ""; }

const logoUrl = getProxyUrl("https://ghantaghartv.com/wp-content/uploads/2022/10/Ghantaghar-TV-banner-png-300.png");
document.getElementById('logo-container').innerHTML = `<img src="${logoUrl}" class="sb-main-logo" crossorigin="anonymous">`;

function downloadPNG() {
    const btn = document.getElementById('sb-download-btn');
    btn.style.display = "none";
    html2canvas(document.querySelector("#capture-area"), { scale: 3, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
        const link = document.createElement('a'); link.download = 'Election_Result.png'; link.href = canvas.toDataURL("image/png"); link.click();
        btn.style.display = "block";
    });
}

function sbSync() {
    const s = document.createElement('script');
    // Location а§∞ Label а§¶а•Ба§µа•И а§°а§Ња§Яа§Њ а§§а§Ња§®а•На§® 'v=2' а§∞ а§Яа§Ња§За§Ѓа§Єа•На§Яа•На§ѓа§Ња§Ѓа•На§™ а§•а§™а§ња§Па§Ха•Л а§Ы
    s.src = "https://www.election.neelamb.com/feeds/posts/default?alt=json-in-script&callback=sbBuild&max-results=150&v=2&t=" + new Date().getTime();
    document.body.appendChild(s);
}

function sbBuild(json) {
    const entries = json.feed.entry || [];
    const processed = entries.map(e => {
        const labels = e.category ? e.category.map(cat => cat.term) : [];
        
        // а•І. а§Єа•На§Ѓа§Ња§∞а•На§Я а§Па§∞а§ња§ѓа§Њ а§≤а•Ла§Ьа§ња§Х (Location а§Ы а§≠а§®а•З а§§а•На§ѓа•Л, а§Ыа•Иа§® а§≠а§®а•З а§™а§єа§ња§≤а•Л а§≤а•За§ђа§≤)
        let area = "а§Еа§®а•На§ѓ а§Ха•На§Ја•За§§а•На§∞";
        if (e.gd$where && e.gd$where[0] && e.gd$where[0].valueString) {
            area = e.gd$where[0].valueString;
        } else if (labels.length > 0) {
            area = labels[0]; // а§™а§єа§ња§≤а•Л а§≤а•За§ђа§≤а§≤а§Ња§И а§Па§∞а§ња§ѓа§Њ а§Ѓа§Ња§®а•На§®а•З
        }

        // а•®. а§™а§Ња§∞а•На§Яа•А а§≤а•Ла§Ьа§ња§Х (а§ѓа§¶а§њ а§Па§∞а§ња§ѓа§Њ а§≤а•За§ђа§≤а§ђа§Ња§Я а§Жа§Па§Ха•Л а§єа•Л а§≠а§®а•З а§¶а•Ла§Єа•На§∞а•Л а§≤а•За§ђа§≤, а§®а§§а•На§∞ а§™а§єа§ња§≤а•Л)
        let party = "а§Єа•На§µа§§а§®а•На§§а•На§∞";
        if (e.gd$where && e.gd$where[0]) {
            party = labels[0] || "а§Єа•На§µа§§а§®а•На§§а•На§∞";
        } else {
            party = labels[1] || labels[0] || "а§Єа•На§µа§§а§®а•На§§а•На§∞";
        }

        let voteText = "";
        if (e.content && e.content.$t) {
            const div = document.createElement('div'); div.innerHTML = e.content.$t;
            voteText = div.innerText.split('\n')[0].trim();
        }

        const photo = e.media$thumbnail ? e.media$thumbnail.url.replace('s72-c', 's1600') : '';
        let sign = '';
        if (e.content && e.content.$t) {
            const div = document.createElement('div'); div.innerHTML = e.content.$t;
            const imgs = div.getElementsByTagName('img'); if (imgs.length > 1) sign = imgs[1].src;
        }

        return { 
            name: e.title.$t, area: area, party: party, 
            photo: getProxyUrl(photo), sign: getProxyUrl(sign), 
            votes: voteText, vCount: parseVotes(voteText) 
        };
    });

    // а§Па§∞а§ња§ѓа§Њ а§Еа§®а•Ба§Єа§Ња§∞ а§Ча•На§∞а•Ба§™а§ња§Щ а§∞ а§Єа§∞а•На§Яа§ња§Щ
    const grouped = {};
    processed.forEach(item => {
        if (!grouped[item.area]) grouped[item.area] = [];
        grouped[item.area].push(item);
    });

    sbRaw = Object.keys(grouped).map(key => ({
        area: key,
        candidates: grouped[key].sort((a, b) => b.vCount - a.vCount)
    }));

    sbActive = [...sbRaw];
    sbRender();
}

function sbRender() {
    const portal = document.getElementById('sb-portal');
    let html = '';
    
    sbActive.slice(0, sbLimit).forEach(group => {
        html += `<div class="sb-area-header"><div class="sb-area-name">${group.area}</div></div><div class="sb-grid">`;
        group.candidates.forEach((c, idx) => {
            html += `
            <div class="sb-card">
                ${idx === 0 && c.vCount > 0 ? `<div class="sb-lead-tag">а§Еа§Ча•На§∞а§§а§Њ</div>` : ''}
                <div class="sb-img-box">
                    <img src="${c.photo}" class="sb-img" crossorigin="anonymous">
                    ${c.sign ? `<div class="sb-badge"><img src="${c.sign}" crossorigin="anonymous"></div>` : ''}
                </div>
                <div class="sb-info">
                    <div class="sb-name">${c.name}</div>
                    <div class="sb-party">${c.party}</div>
                    ${c.votes ? `<div class="sb-votes-box">а§™а•На§∞а§Ња§™а•На§§ а§Ѓа§§: ${c.votes}</div>` : ''}
                </div>
            </div>`;
        });
        html += `</div>`;
    });

    portal.innerHTML = html || "а§°а§Ња§Яа§Њ а§≤а•Ла§° а§єа•Ба§® а§Єа§Ха•За§®а•§ а§Ха•Га§™а§ѓа§Њ а§≤а•Ла§Ха•За§ґа§® а§µа§Њ а§≤а•За§ђа§≤ а§Ъа•За§Х а§Ча§∞а•На§®а•Ба§єа•Ла§Єа•На•§";
    document.getElementById('sb-load-btn').style.display = (sbLimit >= sbActive.length) ? 'none' : 'block';
}

function sbMultiHandler(type) {
    if(type === 'filter') {
        const val = document.getElementById('sb-search-input').value.toLowerCase();
        sbActive = sbRaw.filter(g => g.area.toLowerCase().includes(val) || g.candidates.some(c => c.name.toLowerCase().includes(val)));
        sbLimit = 1;
    } else { sbLimit++; }
    sbRender();
}
sbSync();
</script>
