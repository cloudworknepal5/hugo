<style>
/* Responsive Magazine Grid */
.news-container { display: flex; flex-wrap: wrap; gap: 15px; font-family: 'Arial', sans-serif; margin: 15px 0; }
.col-large { flex: 2; min-width: 320px; }
.col-medium { flex: 1.2; min-width: 280px; display: flex; flex-direction: column; gap: 15px; }
.col-small { flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 10px; }

.feat-card { position: relative; height: 400px; border-radius: 4px; overflow: hidden; background: #000; }
.feat-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
.feat-text { position: absolute; bottom: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); width: 100%; box-sizing: border-box; }
.feat-text a { color: #fff; font-size: 22px; font-weight: bold; text-decoration: none; line-height: 1.3; }

.mid-item img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
.mid-item a { font-size: 16px; font-weight: bold; color: #333; text-decoration: none; display: block; margin-top: 8px; line-height: 1.4; }

.list-item { display: flex; gap: 10px; text-decoration: none; padding-bottom: 8px; border-bottom: 1px solid #eee; margin-bottom: 5px; }
.list-thumb { width: 90px; height: 65px; object-fit: cover; border-radius: 3px; }
.list-title { font-size: 14px; font-weight: 600; color: #444; line-height: 1.3; }

@media (max-width: 850px) { .news-container { flex-direction: column; } }
</style>

<div class="news-container" id="magazine-display">
    <div class="col-large" id="area-big">Loading featured...</div>
    <div class="col-medium" id="area-mid"></div>
    <div class="col-small" id="area-list"></div>
</div>

<script>
/**
 * Multi-function logic:
 * १. आफ्नै ब्लगको URL बाट फिड तान्छ (Blog ID चाहिँदैन)
 * २. डाटालाई Magazine Style मा ढाल्छ
 */
function renderMagazine(json) {
    const entries = json.feed.entry;
    if (!entries) return;

    let bigHTML = "", midHTML = "", listHTML = "";

    entries.forEach((post, i) => {
        const title = post.title.$t;
        const link = post.link.find(l => l.rel === 'alternate').href;
        const img = post.media$thumbnail ? post.media$thumbnail.url.replace('s72-c', 's600') : 'https://via.placeholder.com/600x400';

        if (i === 0) {
            bigHTML = `<div class="feat-card"><a href="${link}"><img src="${img}"><div class="feat-text"><a href="${link}">${title}</a></div></a></div>`;
        } else if (i === 1 || i === 2) {
            midHTML += `<div class="mid-item"><a href="${link}"><img src="${img}"><span>${title}</span></a></div>`;
        } else {
            listHTML += `<a href="${link}" class="list-item"><img src="${img}" class="list-thumb"><div class="list-title">${title}</div></a>`;
        }
    });

    document.getElementById('area-big').innerHTML = bigHTML;
    document.getElementById('area-mid').innerHTML = midHTML;
    document.getElementById('area-list').innerHTML = listHTML;
}

(function() {
    // यहाँ हामीले Blog ID को सट्टा '/feeds/posts/default' प्रयोग गरेका छौं
    // यसले गर्दा यो जुन ब्लगमा राखिन्छ, त्यही ब्लगको डाटा स्वतः तान्छ।
    const label = ""; 
    let feedUrl = `/feeds/posts/default`;
    if(label) feedUrl = `/feeds/posts/default/-/${encodeURIComponent(label)}`;
    
    feedUrl += `?alt=json-in-script&max-results=8&callback=renderMagazine`;

    const script = document.createElement('script');
    script.src = feedUrl;
    document.body.appendChild(script);
})();
</script>
