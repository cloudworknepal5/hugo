<script>
/**
 * Multi-Function Process for Birgunj Update
 */
function sendLiveWA() {
    const name = document.getElementById('waNameInput').value.trim();
    const phone = "9779814272487";

    if (!name) {
        alert("कृपया आफ्नो नाम लेख्नुहोस्।");
        document.getElementById('waNameInput').focus();
        return;
    }

    const msg = encodeURIComponent(`*नयाँ सबस्क्रिप्सन अनुरोध*\n👤 नाम: ${name}\n✅ कृपया मलाई बिरगंज अपडेटको समाचार पठाउनुहोस्।`);
    window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${msg}`, '_blank');
}
</script>
