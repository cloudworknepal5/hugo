<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali News MP3 Player</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .player-card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .news-title { font-size: 18px; color: #333; margin-bottom: 20px; font-weight: bold; }
        
        /* Multi-function Controls */
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        audio { width: 100%; height: 45px; border-radius: 10px; }
        
        .status-badge { background: #e74c3c; color: white; padding: 5px 12px; border-radius: 15px; font-size: 12px; display: inline-block; margin-bottom: 15px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<div class="player-card">
    <div class="status-badge">🔴 LIVE NEWS</div>
    <div class="news-title">आजको मुख्य समाचार (अडियो)</div>

    <div class="controls">
        <audio controls autoplay>
            <source src="https://educationnepal.eu.org/todaynews.mp3" type="audio/mpeg">
            तपाईंको ब्राउजरले अडियो सपोर्ट गर्दैन।
        </audio>
    </div>

    <div style="margin-top: 20px; font-size: 11px; color: #888;">
        स्रोत: Education Nepal | Multi-function Web Player
    </div>
</div>

</body>
</html>
