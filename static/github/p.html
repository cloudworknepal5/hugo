<style>
  /* टाइटल बार स्टाइल */
  .custom-title-bar {
    display: flex; align-items: center; text-align: center;
    margin: 40px auto 20px auto; max-width: 1400px; padding: 0 15px;
  }
  .custom-title-bar::before, .custom-title-bar::after {
    content: ''; flex: 1; border-bottom: 2px solid #000;
  }
  .custom-title-bar span {
    padding: 0 20px; font-size: 26px; font-weight: bold; color: #000; white-space: nowrap;
  }

  /* ग्यालरी स्टाइल */
  .drive-page-container { max-width: 1400px; margin: 0 auto; font-family: sans-serif; }
  .drive-grid { 
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    grid-auto-rows: minmax(250px, auto); grid-gap: 15px; padding: 15px;
  }
  .drive-card:first-child { grid-row: span 2; }
  .drive-card {
    background: #fff; border: 1px solid #333; display: flex;
    flex-direction: column; position: relative; overflow: hidden;
  }
  .thumb-wrapper { width: 100%; height: 100%; position: relative; }
  .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
  .file-name-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0, 0, 0, 0.7); color: white; padding: 10px;
    font-size: 14px; text-align: center;
  }
  @media (max-width: 1000px) {
    .drive-grid { grid-template-columns: 1fr 1fr; }
    .drive-card:first-child { grid-column: span 2; }
    .custom-title-bar span { font-size: 20px; }
  }
</style>

<div class="drive-page-container">
  <div class="custom-title-bar">
    <span>फेमस नेपाल सन्देश साप्ताहिक पढ्नुहोस्</span>
  </div>

  <div id="drive-grid-display" class="drive-grid"></div>
  
  <div style="text-align:center; margin: 30px 0;">
    <button id="load-more-btn" onclick="handleLoadMore()" style="padding: 12px 30px; cursor:pointer; background:#28a745; color:#fff; border:none; border-radius:5px; display:none;">थप हेर्नुहोस्</button>
  </div>
  <div id="status-msg" style="text-align:center; padding:20px;">लोड हुँदैछ...</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaBFiBhFM-V3bZd5i3QRPEs1P1Md9GMJ-f5GzXrlaW7ZGNLjI6Z7PPikc1i0HZ-5vg/exec";
let allFiles = []; let displayedCount = 0; const BATCH_SIZE = 9;

// Multi-function Implementation
async function initDriveGallery() {
    try {
        const response = await fetch(SCRIPT_URL);
        allFiles = await response.json();
        document.getElementById('status-msg').style.display = 'none';
        renderFiles();
    } catch (err) {
        document.getElementById('status-msg').innerHTML = "डाटा लोड गर्न सकिएन।";
    }
}

function createCardHTML(file) {
    return `
        <a href="${file.url}" target="_blank" class="drive-card">
            <div class="thumb-wrapper">
                <img src="https://drive.google.com/thumbnail?id=${file.id}&sz=w1000" alt="${file.name}">
                <div class="file-name-overlay">${file.name}</div>
            </div>
        </a>
    `;
}

function renderFiles() {
    const grid = document.getElementById('drive-grid-display');
    const nextBatch = allFiles.slice(displayedCount, displayedCount + BATCH_SIZE);
    nextBatch.forEach(file => grid.insertAdjacentHTML('beforeend', createCardHTML(file)));
    displayedCount += nextBatch.length;
    document.getElementById('load-more-btn').style.display = (displayedCount < allFiles.length) ? 'inline-block' : 'none';
}

function handleLoadMore() { renderFiles(); }

initDriveGallery();
</script>
