<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelam Admin v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap');
        body { font-family: 'Mukta', sans-serif; }
        .sidebar-link.active { background: #e11d48; color: white; }
    </style>
</head>
<body class="bg-gray-50 flex overflow-hidden h-screen">

    <div class="w-72 bg-slate-900 text-white flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <h1 class="text-3xl font-black italic tracking-tighter text-rose-500">NEELAM <span class="text-white">CMS</span></h1>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Version 6.0 Live</p>
        </div>
        
        <nav class="flex-1 p-6 space-y-2 overflow-y-auto">
            <button onclick="showTab('publish')" class="sidebar-link w-full text-left p-4 rounded-2xl transition hover:bg-slate-800 flex items-center gap-3">
                <i class="fa fa-paper-plane w-5"></i> समाचार लेख्नुहोस्
            </button>
            <button onclick="showTab('branding')" class="sidebar-link w-full text-left p-4 rounded-2xl transition hover:bg-slate-800 flex items-center gap-3">
                <i class="fa fa-palette w-5"></i> ब्रान्डिङ (Logo/Fav)
            </button>
            <button onclick="showTab('settings')" class="sidebar-link w-full text-left p-4 rounded-2xl transition hover:bg-slate-800 flex items-center gap-3">
                <i class="fa fa-tags w-5"></i> क्याटेगरी र लेखक
            </button>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center gap-3 bg-slate-800 p-4 rounded-2xl">
                <div class="w-10 h-10 bg-rose-500 rounded-xl flex items-center justify-center font-bold">M</div>
                <div>
                    <p class="text-sm font-bold">मुकेश बस्नेत</p>
                    <p class="text-[10px] text-slate-400">Main Administrator</p>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-20 bg-white border-b flex items-center justify-between px-10 shadow-sm">
            <h2 id="tab-title" class="text-2xl font-black text-slate-800 uppercase">समाचार सम्पादन</h2>
            <div id="status-indicator" class="px-4 py-1 bg-green-100 text-green-600 rounded-full text-xs font-bold uppercase">Backend Connected</div>
        </header>

        <main class="flex-1 overflow-y-auto p-10 bg-gray-50">
            
            <div id="tab-publish" class="tab-content">
                <div class="bg-white p-10 rounded-[40px] shadow-sm border border-gray-100 max-w-4xl mx-auto">
                    <form id="newsForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-sm font-bold text-slate-600 mb-2">मुख्य समाचार शीर्षक</label>
                                <input type="text" id="title" class="w-full p-4 bg-gray-50 border rounded-2xl focus:ring-4 focus:ring-rose-100 outline-none font-bold text-lg" placeholder="यहाँ हेडलाइन लेख्नुहोस्..." required>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-2">इमेज URL</label>
                                <input type="text" id="image_url" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none" placeholder="https://image-link.com">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 mb-2">क्याटेगरी</label>
                                <select id="category" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none"></select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2">समाचार विवरण</label>
                            <textarea id="content" rows="10" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none leading-relaxed" placeholder="पुरा समाचार यहाँ लेख्नुहोस्..."></textarea>
                        </div>
                        <button type="submit" class="w-full bg-rose-600 text-white p-5 rounded-3xl font-black text-xl shadow-xl hover:bg-rose-700 hover:-translate-y-1 transition-all">
                            <i class="fa fa-cloud-upload mr-2"></i> समाचार पब्लिस गर्नुहोस्
                        </button>
                    </form>
                </div>
            </div>

            <div id="tab-branding" class="tab-content hidden">
                <div class="bg-white p-10 rounded-[40px] shadow-sm border border-gray-100 max-w-2xl mx-auto text-center">
                    <i class="fa fa-palette text-5xl text-rose-500 mb-6"></i>
                    <h3 class="text-2xl font-bold mb-8">लोगो र फेभिकन अपडेट</h3>
                    <div class="space-y-6 text-left">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2">लोगो (Logo) URL</label>
                            <input type="text" id="brand-logo" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 mb-2">फेभिकन (Favicon) URL</label>
                            <input type="text" id="brand-favicon" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                        </div>
                        <button onclick="updateBranding()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-bold text-lg shadow-lg hover:bg-black transition">ब्रान्डिङ सेभ गर्नुहोस्</button>
                    </div>
                </div>
            </div>

            <div id="tab-settings" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-4xl mx-auto">
                    <div class="bg-white p-8 rounded-[30px] shadow-sm border">
                        <h3 class="font-bold text-xl mb-4 text-rose-600 italic">लेखक थप्नुहोस्</h3>
                        <div class="flex gap-2">
                            <input type="text" id="new-author" class="flex-1 p-3 bg-gray-50 border rounded-xl outline-none" placeholder="नाम...">
                            <button onclick="addSetting('authors')" class="bg-slate-900 text-white px-6 rounded-xl font-bold">थप्ने</button>
                        </div>
                        <div id="list-authors" class="mt-4 space-y-2 text-sm text-slate-600 uppercase font-bold"></div>
                    </div>
                    <div class="bg-white p-8 rounded-[30px] shadow-sm border">
                        <h3 class="font-bold text-xl mb-4 text-blue-600 italic">क्याटेगरी थप्नुहोस्</h3>
                        <div class="flex gap-2">
                            <input type="text" id="new-category" class="flex-1 p-3 bg-gray-50 border rounded-xl outline-none" placeholder="नाम...">
                            <button onclick="addSetting('categories')" class="bg-slate-900 text-white px-6 rounded-xl font-bold">थप्ने</button>
                        </div>
                        <div id="list-categories" class="mt-4 space-y-2 text-sm text-slate-600 uppercase font-bold"></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const API_BASE = ""; // यहाँ ब्याकेन्ड URL राख्नुहोस्, एउटै डोमेन भए खाली छोड्नुहोस्

        // १. ट्याब स्विच गर्ने लजिक
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('tab-title').innerText = tab === 'publish' ? 'समाचार सम्पादन' : (tab === 'branding' ? 'ब्रान्डिङ सेटअप' : 'सिस्टम सेटिङ');
        }

        // २. डाटा लोड गर्ने (Categories, Authors, Branding)
        async function loadSettings() {
            // क्याटेगरी लोड
            const cats = await fetch(API_BASE + '/api/categories').then(r => r.json());
            const catSelect = document.getElementById('category');
            catSelect.innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('list-categories').innerHTML = cats.map(c => `• ${c.name}`).join('<br>');

            // लेखक लोड
            const auths = await fetch(API_BASE + '/api/authors').then(r => r.json());
            document.getElementById('list-authors').innerHTML = auths.map(a => `• ${a.name}`).join('<br>');

            // ब्रान्डिङ लोड
            const brand = await fetch(API_BASE + '/api/branding').then(r => r.json());
            document.getElementById('brand-logo').value = brand.logo;
            document.getElementById('brand-favicon').value = brand.favicon;
        }

        // ३. नयाँ समाचार पब्लिस
        document.getElementById('newsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                image_url: document.getElementById('image_url').value,
                category: document.getElementById('category').value
            };

            const res = await fetch(API_BASE + '/api/publish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json());

            if(res.success) {
                alert('बधाई छ! समाचार लाइभ भयो।');
                e.target.reset();
            }
        });

        // ४. ब्रान्डिङ अपडेट
        async function updateBranding() {
            const payload = {
                logo: document.getElementById('brand-logo').value,
                favicon: document.getElementById('brand-favicon').value
            };
            const res = await fetch(API_BASE + '/api/branding', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json());
            if(res.success) alert('ब्रान्डिङ अपडेट भयो!');
        }

        // ५. नयाँ सेटिङ थप्ने
        async function addSetting(type) {
            const inputId = type === 'authors' ? 'new-author' : 'new-category';
            const name = document.getElementById(inputId).value;
            await fetch(API_BASE + '/api/' + type, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            document.getElementById(inputId).value = '';
            loadSettings();
        }

        loadSettings();
    </script>
</body>
</html>
