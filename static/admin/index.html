<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Portal Admin | Neelamb Art & Design</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js"></script>

  <script>
    // १. क्लाउडफ्लेयर ब्रिज: नेटलिफाइको साँचो जबरजस्ती सेट गर्ने
    localStorage.setItem("netlifySiteURL", "https://musical-klepon-d9603a.netlify.app");

    // २. लगइन भएपछि रिडाइरेक्ट गर्ने लजिक
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
