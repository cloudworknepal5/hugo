<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelam Admin - Security Protected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center transform transition-all">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-6 shadow-lg">
                <i class="fa fa-lock"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-800 mb-2">NEELAM CMS</h2>
            <p class="text-gray-500 mb-8 font-bold text-sm uppercase tracking-widest">प्रवेशको लागि पिन कोड राख्नुहोस्</p>
            
            <input type="password" id="admin-pin" class="w-full p-4 text-center text-2xl tracking-[1rem] bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none transition-all mb-6" placeholder="****">
            
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-700 active:scale-95 transition-all">
                ड्यास बोर्ड खोल्नुहोस्
            </button>
            <p id="login-error" class="text-red-500 mt-4 font-bold hidden text-sm">गलत पिन! फेरि प्रयास गर्नुहोस्।</p>
        </div>
    </div>

    <div id="main-dashboard" class="flex min-h-screen hidden">
        <div class="w-64 bg-slate-900 text-white p-6 shadow-xl hidden md:block">
            <h2 class="text-2xl font-black mb-10 text-blue-400 italic">NEELAM <span class="text-white">CMS</span></h2>
            <nav class="space-y-4">
                <a href="#" class="block p-3 bg-blue-600 rounded-xl"><i class="fa fa-plus-circle mr-2"></i> नयाँ समाचार</a>
                <a href="#" class="block p-3 hover:bg-slate-800 rounded-xl"><i class="fa fa-list mr-2"></i> समाचार सुची</a>
                <button onclick="location.reload()" class="block w-full text-left p-3 hover:bg-red-900/30 text-red-400 rounded-xl mt-20 font-bold">
                    <i class="fa fa-sign-out mr-2"></i> बाहिरिनुहोस्
                </button>
            </nav>
        </div>

        <div class="flex-1 p-6 md:p-10 overflow-y-auto">
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">नयाँ पोस्ट लेख्नुहोस्</h1>
                <div class="flex items-center gap-3">
                    <span class="text-gray-500 font-bold hidden sm:block">मुकेश बास्नेत</span>
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold border-2 border-blue-200">M</div>
                </div>
            </header>

            <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-gray-100 max-w-4xl">
                <form id="postForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2 uppercase">समाचार शीर्षक</label>
                        <input type="text" id="title" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all text-lg font-bold" placeholder="मुख्य हेडलाइन यहाँ..." required>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-black text-gray-700 mb-2 uppercase">Slug (URL)</label>
                            <input type="text" id="slug" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none" placeholder="news-slug-here">
                        </div>
                        <div>
                            <label class="block text-sm font-black text-gray-700 mb-2 uppercase">थम्बनेल लिंक</label>
                            <input type="text" id="thumbnail" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none" placeholder="https://img.com/1.jpg">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2 uppercase">समाचार सामग्री (HTML/Text)</label>
                        <textarea id="content" rows="12" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none leading-relaxed" placeholder="पुरा समाचार यहाँ लेख्नुहोस्..."></textarea>
                    </div>

                    <button type="submit" class="w-full md:w-auto bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-lg shadow-2xl hover:bg-blue-700 transform hover:scale-105 transition-all">
                        <i class="fa fa-cloud-upload mr-2"></i> पब्लिस गर्नुहोस्
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // १. सुरक्षा चेक (Login Logic)
        const ADMIN_PIN = "1234"; // मुकेश जी, यो '1234' लाई आफ्नो गोप्य पिनले बदल्नुहोस्

        function checkLogin() {
            const enteredPin = document.getElementById('admin-pin').value;
            const errorMsg = document.getElementById('login-error');
            
            if (enteredPin === ADMIN_PIN) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                sessionStorage.setItem('isAdmin', 'true');
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        }

        // २. डाटा पठाउने (Post Logic)
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                slug: document.getElementById('slug').value,
                thumbnail: document.getElementById('thumbnail').value,
                content: document.getElementById('content').value,
                pin: sessionStorage.getItem('isAdmin') // सुरक्षाको लागि पिन स्थिति पठाउने
            };

            const API_URL = '/api/add-post'; 

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    alert('बधाई छ! समाचार Cloudflare D1 मा सुरक्षित भयो।');
                    document.getElementById('postForm').reset();
                } else {
                    alert('सर्भर एरर: समाचार सेभ हुन सकेन।');
                }
            } catch (err) {
                alert('कनेक्सन एरर: ' + err.message);
            }
        });

        // इन्टर थिच्दा लगइन हुने बनाउन
        document.getElementById('admin-pin').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLogin();
        });
    </script>
</body>
</html>
