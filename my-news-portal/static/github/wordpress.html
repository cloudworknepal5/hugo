<html lang="ne">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        /* अघिल्लो डिजाइनका CSS यहाँ राख्नुहोस् */
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .logout { color: #e74c3c; text-decoration: none; font-weight: bold; }
        textarea, input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        .btn-publish { background: #27ae60; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📰 समाचार व्यवस्थापन</h2>
        <a href="?action=logout" class="logout">लगआउट (Logout)</a>
    </div>

    <label>समाचार शीर्षक:</label>
    <input type="text" id="title" placeholder="शीर्षक...">

    <label>समाचार विवरण:</label>
    <textarea id="content" rows="10" placeholder="यहाँ समाचार लेख्नुहोस्..."></textarea>

    <div style="display: flex; gap: 10px;">
        <button class="btn btn-publish" onclick="syncNews()">सबै साइटमा पठाउनुहोस् (Push to All)</button>
    </div>

    <div id="status" style="margin-top:20px; font-family: monospace; background: #eee; padding: 10px;">सञ्चालनको प्रतीक्षामा...</div>
</div>

<script>
    async function syncNews() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const statusDiv = document.getElementById('status');

        if(!title || !content) { alert("विवरण खाली छ!"); return; }

        statusDiv.innerHTML = "प्रक्रिया सुरु हुँदैछ...";
        
        // यहाँ तपाईंको 'API Connector' सँग जोड्न सकिन्छ
        setTimeout(() => {
            statusDiv.innerHTML = "✅ सफलतापूर्वक सबै साइटमा अपडेट भयो!";
        }, 2000);
    }
</script>

</body>
</html>
