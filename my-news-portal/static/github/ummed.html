<style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap');

    /* हलुका रातो ब्याकग्राउण्ड */
    body { background-color: #fffafa; margin: 0; padding: 0; font-family: 'Mukta', sans-serif; }

    .election-wrapper { 
        max-width: 1200px; 
        margin: auto; 
        padding: 15px; 
    }

    /* १. सर्च बार - सबैभन्दा माथि र बोर्डर सहित */
    .dashboard-tools { 
        margin: 20px 0; 
        text-align: center; 
        padding-bottom: 20px;
        border-bottom: 2px dashed #ffcccc; /* सेक्सन डिभाइडर */
    }
    #search-box { 
        width: 100%; max-width: 600px; padding: 14px 25px; border-radius: 30px; 
        border: 2px solid #cc0000; font-size: 19px; outline: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .site-logo-container { text-align: center; margin: 15px 0; }
    .site-logo-container img { max-width: 180px; height: auto; }
    
    .main-title-banner { 
        background: #cc0000; color: #fff; padding: 15px; 
        text-align: center; font-size: 32px; font-weight: 800; 
        border-radius: 8px; margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(204, 0, 0, 0.2);
    }

    /* एरिया ग्रुप र डिभाइडर */
    .area-group-container { 
        display: flex; flex-direction: column; align-items: center; 
        margin-bottom: 50px; 
        padding-bottom: 30px;
        border-bottom: 1px dashed #e74c3c; /* प्रत्येक क्षेत्र पछि लाइन */
    }
    .area-banner {
        background: #e74c3c; color: #fff; padding: 8px 60px; 
        font-size: 26px; font-weight: 800; border-radius: 50px;
        margin-bottom: 25px;
    }

    /* २ वटा ग्रिड स्टाइल */
    .rivals-grid {
        display: grid; 
        grid-template-columns: repeat(2, 1fr); 
        gap: 25px; 
        width: 100%;
    }

    /* उम्मेदवार कार्ड र आकर्षक बोर्डर */
    .candidate-card { 
        background: #fff; 
        border: 3px solid #eee; 
        border-radius: 12px; 
        overflow: hidden; 
        transition: 0.4s;
        display: flex;
        flex-direction: column;
    }
    
    .candidate-card:hover { 
        border-color: #cc0000;
        transform: translateY(-8px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }

    .photo-holder { position: relative; width: 100%; overflow: hidden; border-bottom: 2px solid #eee; }
    
    /* डेस्कटपमा फोटोको उचाइ धेरै बढाइएको */
    .candidate-img { 
        width: 100%; 
        height: 550px; 
        object-fit: cover; 
        transition: transform 0.6s ease;
    }
    .candidate-card:hover .candidate-img { transform: scale(1.08); }

    .symbol-badge {
        position: absolute; right: 15px; bottom: 15px;
        width: 80px; height: 80px; background: #fff; border-radius: 50%;
        padding: 5px; border: 3px solid #cc0000;
        display: flex; align-items: center; justify-content: center; z-index: 10;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .symbol-badge img { width: 85%; height: 85%; object-fit: contain; }

    /* इन्फो बक्स - २० फन्ट र ८०० वाइड */
    .info-box { padding: 20px; text-align: center; }
    .info-name { 
        font-size: 22px; 
        font-weight: 800; 
        color: #1a1a1a; 
        margin-bottom: 8px; 
    }
    .info-party { 
        font-size: 20px; 
        font-weight: 800; 
        color: #e74c3c; 
    }

    /* सोसल मिडिया */
    .social-footer {
        display: flex; justify-content: center; align-items: center; gap: 20px;
        padding: 25px 10px; 
        margin-top: 20px; flex-wrap: wrap;
        border-top: 2px dashed #ffcccc;
    }
    .social-link { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #555; font-weight: bold; font-size: 16px; }
    .social-link img { width: 22px; height: 22px; }

    /* लोड मोर अन्तिममा */
    .load-more-container { text-align: center; margin: 30px 0 60px 0; }
    #load-more-btn {
        background: #2c3e50; color: #fff; border: none; padding: 15px 60px; 
        font-size: 18px; font-weight: 800; border-radius: 50px; cursor: pointer;
        transition: 0.3s;
    }
    #load-more-btn:hover { background: #cc0000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

    /* मोबाइलको लागि एडजस्टमेन्ट */
    @media (max-width: 800px) {
        .candidate-img { height: 320px; } /* मोबाइलमा ठिक्कको उचाइ */
        .info-name, .info-party { font-size: 18px; }
        .rivals-grid { gap: 12px; }
        .area-banner { font-size: 20px; padding: 6px 30px; }
    }
</style>

<div class="election-wrapper">
    <div class="dashboard-tools">
        <input type="text" id="search-box" placeholder="उम्मेदवार, क्षेत्र वा दल खोज्नुहोस्..." oninput="handleFilter()">
    </div>

    <div class="site-logo-container">
        <img src="https://ghantaghartv.com/wp-content/uploads/2022/10/Ghantaghar-TV-banner-png-300.png" alt="LOGO">
    </div>

    <div class="main-title-banner">निर्वाचन विशेष: हेभिवेट प्रतिस्पर्धा</div>

    <div id="election-portal-v3">लोड हुँदैछ...</div>

    <div class="social-footer">
        <a href="#" class="social-link"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png"> @GhantagharTV</a>
        <a href="#" class="social-link"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"> @GhantagharTV</a>
        <a href="#" class="social-link"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"> @GhantagharTV</a>
    </div>

    <div class="load-more-container">
        <button id="load-more-btn" onclick="showMore()">थप हेर्नुहोस् (Load More)</button>
    </div>
</div>

<script>
// बहु-कार्यक्षमता: डेटा लोड र फिल्टरिङ
let rawData = [];
let activeData = [];
let groupLimit = 1; 

function startSync() {
    const s = document.createElement('script');
    s.src = "https://www.election.neelamb.com/feeds/posts/default?alt=json-in-script&callback=buildGrid&max-results=150&t=" + new Date().getTime();
    document.body.appendChild(s);
}

function buildGrid(json) {
    const entries = json.feed.entry || [];
    const processed = entries.map(e => {
        const labels = e.category ? e.category.map(cat => cat.term) : [];
        const area = labels[0] || "अन्य"; 
        const party = labels[1] || "स्वतन्त्र"; 
        const photo = e.media$thumbnail ? e.media$thumbnail.url.replace('s72-c', 's800') : '';
        
        let sign = '';
        if (e.content && e.content.$t) {
            const div = document.createElement('div');
            div.innerHTML = e.content.$t;
            const imgs = div.getElementsByTagName('img');
            if (imgs.length > 1) sign = imgs[1].src;
        }
        return { name: e.title.$t, party: party, area: area, photo: photo, sign: sign };
    });

    const grouped = {};
    processed.forEach(item => {
        if (!grouped[item.area]) grouped[item.area] = [];
        grouped[item.area].push(item);
    });

    rawData = Object.keys(grouped).map(areaName => ({
        area: areaName,
        candidates: grouped[areaName]
    }));

    activeData = [...rawData];
    renderData();
}

function renderData() {
    const container = document.getElementById('election-portal-v3');
    const btn = document.getElementById('load-more-btn');
    let html = '';
    
    const slice = activeData.slice(0, groupLimit);

    slice.forEach(group => {
        html += `<div class="area-group-container">
                    <div class="area-banner">${group.area}</div>
                    <div class="rivals-grid">`;
        
        // प्रत्येक क्षेत्रमा २ वटा मात्र उम्मेदवार
        group.candidates.slice(0, 2).forEach(c => { 
            html += `
            <div class="candidate-card">
                <div class="photo-holder">
                    <img src="${c.photo}" class="candidate-img" loading="lazy">
                    ${c.sign ? `<div class="symbol-badge"><img src="${c.sign}"></div>` : ''}
                </div>
                <div class="info-box">
                    <div class="info-name">${c.name}</div>
                    <div class="info-party">${c.party}</div>
                </div>
            </div>`;
        });

        html += `</div></div>`;
    });

    container.innerHTML = html || "<p style='text-align:center'>डेटा लोड भइरहेको छ वा फेला परेन...</p>";
    if(btn) btn.style.display = (groupLimit >= activeData.length) ? 'none' : 'inline-block';
}

function handleFilter() {
    const term = document.getElementById('search-box').value.toLowerCase();
    activeData = rawData.filter(g => 
        g.area.toLowerCase().includes(term) || 
        g.candidates.some(c => c.name.toLowerCase().includes(term) || c.party.toLowerCase().includes(term))
    );
    groupLimit = 1;
    renderData();
}

function showMore() {
    groupLimit += 1;
    renderData();
}

// अटो सिंक फंक्सन
setInterval(startSync, 300000);
startSync();
</script>
