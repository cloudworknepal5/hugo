<style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&display=swap');
    
    .drive-page-container { max-width: 1400px; margin: 0 auto; font-family: 'Mukta', sans-serif; padding: 20px; background: #fff; }

    /* टाइटल बार - केन्द्रमा रेखासहित */
    .custom-title-bar { display: flex; align-items: center; text-align: center; margin: 20px auto 30px auto; width: 100%; }
    .custom-title-bar::before, .custom-title-bar::after { content: ''; flex: 1; border-bottom: 2px solid #000; }
    .custom-title-bar span { padding: 0 20px; font-size: 26px; font-weight: bold; color: #000; white-space: nowrap; }

    /* सर्च बक्स */
    .search-container { text-align: center; margin-bottom: 40px; }
    #gallery-search {
        width: 100%; max-width: 500px; padding: 12px 25px; border: 2px solid #333;
        border-radius: 50px; font-size: 16px; outline: none; transition: 0.3s;
        font-family: 'Mukta', sans-serif;
    }
    #gallery-search:focus { border-color: #e60000; box-shadow: 0 0 10px rgba(230,0,0,0.1); }

    /* ग्रिड लेआउट (२:१:१:१:१) */
    .grid-group { 
        display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; 
        grid-auto-rows: minmax(250px, auto); grid-gap: 15px; margin-bottom: 15px; 
    }
    .grid-group .drive-card:first-child { grid-row: span 2; }

    .drive-card {
        background: #fff; border: 1px solid #333; display: flex; flex-direction: column; 
        position: relative; overflow: hidden; text-decoration: none; color: inherit; 
        transition: transform 0.2s; height: 100%;
    }
    .drive-card:hover { transform: scale(1.01); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }

    .thumb-wrapper { width: 100%; height: 100%; position: relative; min-height: 200px; background: #eee; }
    .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }

    .file-name-overlay {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: rgba(0, 0, 0, 0.7); color: white; padding: 10px;
        font-size: 14px; text-align: center; white-space: nowrap; 
        overflow: hidden; text-overflow: ellipsis; z-index: 5;
    }

    .download-link-btn {
        position: absolute; top: 10px; right: 10px; background: #e60000; color: #fff;
        width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center;
        justify-content: center; z-index: 10; border: 2px solid #fff; transition: 0.2s;
    }
    .download-link-btn:hover { background: #000; transform: scale(1.1); }

    .btn-container { text-align: center; margin: 30px 0; }
    #load-more-btn {
        padding: 12px 35px; cursor: pointer; background: #28a745; color: #fff;
        border: none; border-radius: 5px; font-size: 16px; font-weight: bold; display: none;
    }
    #status-msg { text-align: center; padding: 20px; font-weight: bold; color: #555; }

    @media (max-width: 1000px) {
        .grid-group { grid-template-columns: 1fr 1fr; }
        .grid-group .drive-card:first-child { grid-column: span 2; }
        .custom-title-bar span { font-size: 18px; padding: 0 10px; }
    }
</style>

<div class="drive-page-container">
    <div class="custom-title-bar">
        <span id="gallery-title">लोड हुँदैछ...</span>
    </div>

    <div class="search-container">
        <input type="text" id="gallery-search" placeholder="फाइलको नाम खोज्नुहोस्..." onkeyup="handleSearch()" />
    </div>

    <div id="main-gallery-container"></div>
    
    <div class="btn-container">
        <button id="load-more-btn" onclick="handleLoadMore()">थप फाइलहरू हेर्नुहोस्</button>
    </div>
    <div id="status-msg">सामग्री लोड हुँदैछ...</div>
</div>

<script>
/**
 * Universal Multi-function Gallery with Live Search [2026-04-19]
 */

const SCRIPT_BASE_URL = "https://script.google.com/macros/s/AKfycbzB6SCAGH8aOweGG6twgctfcyBg48eU-TCgNolqNOoGGp6DiTuBXJ6MjMiLwIVJ8o0U/exec";

// --- १० वटा फोल्डर आईडीहरूको म्याप (डमी डाटासहित) ---
const FOLDER_MAP = {
    "baisakh": "133kF0VZL3_HiXEteCno3WOkqDqNEZaKW",
    "jestha": "1A_7_Sample_Folder_ID_Jestha",
    "ashadh": "1B_8_Sample_Folder_ID_Ashadh",
    "shrawan": "1C_9_Sample_Folder_ID_Shrawan",
    "bhadra": "1D_0_Sample_Folder_ID_Bhadra",
    "ashwin": "1E_1_Sample_Folder_ID_Ashwin",
    "kartik": "1F_2_Sample_Folder_ID_Kartik",
    "mangsir": "1G_3_Sample_Folder_ID_Mangsir",
    "poush": "1H_4_Sample_Folder_ID_Poush",
    "magh": "1I_5_Sample_Folder_ID_Magh"
};

const urlParams = new URLSearchParams(window.location.search);
const folderKey = urlParams.get('cat'); // URL मा ?cat=baisakh छ भने
const MY_FOLDER_ID = urlParams.get('id') || FOLDER_MAP[folderKey] || "133kF0VZL3_HiXEteCno3WOkqDqNEZaKW"; 
const PAGE_TITLE = urlParams.get('title') || "हाम्रो ई-पेपर ग्यालरी";

document.getElementById('gallery-title').innerText = PAGE_TITLE;

let allFiles = []; 
let filteredFiles = [];
let displayedCount = 0; 
const BATCH_SIZE = 9; 

async function fetchAndInit() {
    const url = `${SCRIPT_BASE_URL}?id=${MY_FOLDER_ID}&t=${new Date().getTime()}`;
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.error) {
            document.getElementById('status-msg').innerHTML = "त्रुटि: " + data.error;
            return;
        }

        // नयाँ फाइल पहिले आउने गरी मिलाउने
        allFiles = data.sort((a, b) => new Date(b.date) - new Date(a.date));
        filteredFiles = [...allFiles];

        document.getElementById('status-msg').style.display = 'none';
        renderBatch(true); 
    } catch (err) {
        document.getElementById('status-msg').innerHTML = "डाटा लोड हुन सकेन। कृपया रिफ्रेस गर्नुहोस्।";
    }
}

function createCardHTML(file) {
    const thumb = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
    const downloadLink = `https://drive.google.com/uc?export=download&id=${file.id}`;

    return `
        <div class="drive-card">
            <a href="${downloadLink}" class="download-link-btn" title="Download" download>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg>
            </a>
            <a href="${file.url}" target="_blank" style="height:100%; width:100%; display:block;">
                <div class="thumb-wrapper">
                    <img src="${thumb}" alt="${file.name}" loading="lazy">
                    <div class="file-name-overlay">${file.name}</div>
                </div>
            </a>
        </div>
    `;
}

function renderBatch(isFirstLoad = false) {
    const mainContainer = document.getElementById('main-gallery-container');
    if(isFirstLoad) {
        mainContainer.innerHTML = '';
        displayedCount = 0;
    }

    const nextBatch = filteredFiles.slice(displayedCount, displayedCount + BATCH_SIZE);
    
    if (nextBatch.length > 0) {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'grid-group';
        let batchHTML = '';
        nextBatch.forEach(file => { batchHTML += createCardHTML(file); });
        groupDiv.innerHTML = batchHTML;
        mainContainer.appendChild(groupDiv);
    }

    displayedCount += nextBatch.length;
    updateButtonVisibility();
}

function handleSearch() {
    const query = document.getElementById('gallery-search').value.toLowerCase();
    filteredFiles = allFiles.filter(file => file.name.toLowerCase().includes(query));
    renderBatch(true); 
}

function updateButtonVisibility() {
    const btn = document.getElementById('load-more-btn');
    btn.style.display = (displayedCount < filteredFiles.length) ? 'inline-block' : 'none';
}

function handleLoadMore() { renderBatch(); }

fetchAndInit();
</script>
