<div id="bara-election-header">
    <style>
        #bara-election-header {
            background: #d32f2f;
            color: white;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Mukta', sans-serif;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header-title { font-weight: bold; font-size: 14px; }
        .header-info { display: flex; align-items: center; gap: 15px; }
        #live-clock { background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 15px; font-size: 13px; }
        .refresh-btn { 
            background: white; color: #d32f2f; border: none; 
            padding: 2px 10px; border-radius: 10px; cursor: pointer; 
            font-size: 12px; font-weight: bold;
        }
    </style>

    <div class="header-title">प्रतिनिधि सभा निर्वाचन २०८२ - बारा</div>
    
    <div class="header-info">
        <div id="live-clock">लोड हुँदै...</div>
        <button class="refresh-btn" onclick="location.reload()">Refresh</button>
    </div>

    <script>
        const HeaderApp = {
            // Function 1: Time Update
            updateTime: function() {
                const now = new Date();
                const nepalTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (5.75 * 3600000));
                document.getElementById('live-clock').innerText = "समय: " + nepalTime.toLocaleTimeString('ne-NP', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                });
            },
            // Function 2: Initialization
            init: function() {
                this.updateTime();
                setInterval(() => this.updateTime(), 1000);
            }
        };
        // Run App
        document.addEventListener('DOMContentLoaded', () => HeaderApp.init());
    </script>
</div>
