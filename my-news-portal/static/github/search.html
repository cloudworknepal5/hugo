<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal24News - Auto Image Search Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Mukta', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .main-wrapper { width: 100%; max-width: 900px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #002e5b; text-align: center; border-bottom: 3px solid #ed1c24; padding-bottom: 10px; }
        
        .embed-section { border: 2px solid #ddd; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }

        /* Search Input Area */
        .search-container { 
            background: #eef2f7; padding: 20px; border-radius: 12px; 
            text-align: center; border: 2px dashed #002e5b; 
        }
        .search-box {
            width: 80%; padding: 12px; font-size: 18px; border: 2px solid #ddd;
            border-radius: 5px; margin-bottom: 15px; font-family: 'Mukta', sans-serif;
        }
        .btn-search {
            display: inline-block; padding: 15px 40px; background: #ed1c24; 
            color: white; border: none; border-radius: 50px; 
            font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(237, 28, 36, 0.3);
        }
        .btn-search:hover { background: #c11219; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h2><i class="fas fa-keyboard"></i> Preeti to Unicode Auto</h2>

    <div class="embed-section">
        <div class="embed-container" style="height: 600px;">
            <embed src="https://designers2077.github.io/PreetiToUnicodeAuto/" width="100%" height="100%">
        </div>
    </div>

    <div class="search-container">
        <p style="margin-bottom: 10px; font-weight: bold;">३. यहाँ युनिकोड पेस्ट गर्नुहोस् र 'Enter' थिच्नुहोस्:</p>
        
        <input type="text" id="auto_search_input" class="search-box" 
               placeholder="युनिकोड यहाँ राख्नुहोस्..." 
               onkeyup="checkEnter(event)">
        <br>
        
        <button onclick="performSearch()" class="btn-search">
            <i class="fab fa-google"></i> गुगलमा फोटो खोज्नुहोस्
        </button>
    </div>
</div>

<script type="text/javascript">
    // १. इन्टर बटन थिच्दा स्वतः सर्च हुने
    function checkEnter(event) {
        if (event.key === "Enter") {
            performSearch();
        }
    }

    // २. गुगल इमेज सर्च नयाँ ट्याबमा खोल्ने फङ्सन
    function performSearch() {
        var query = document.getElementById("auto_search_input").value;
        
        if (query.trim() !== "") {
            var googleUrl = "https://www.google.com/search?q=" + encodeURIComponent(query) + "&tbm=isch";
            
            // नयाँ ट्याबमा सिधै खोल्छ
            window.open(googleUrl, '_blank');
        } else {
            alert("कृपया सर्च गर्नका लागि केही युनिकोड शब्द राख्नुहोस्!");
        }
    }
</script>

</body>
</html>
