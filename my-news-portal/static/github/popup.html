<script>
(function() {
    // १. मल्टिफङ्सन CSS Injector (एक पटक मात्र स्टाइल लोड हुने गरी)
    if (!document.getElementById('adnp-core-style')) {
        const css = `
            .adnp-popup-overlay {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.85); display: flex;
                justify-content: center; align-items: center; z-index: 1000000;
                backdrop-filter: blur(6px);
            }
            .adnp-popup-box {
                position: relative; background: #fff; padding: 6px;
                border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.8);
                animation: adnpSpinIn 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
                max-width: 90%;
            }
            /* डेस्कटपमा ठुलो साइज */
            @media screen and (min-width: 769px) { .adnp-popup-box { width: 550px; } }
            /* मोबाइलमा सानो साइज */
            @media screen and (max-width: 768px) { .adnp-popup-box { width: 320px; } }
            
            @keyframes adnpSpinIn {
                0% { transform: scale(0) rotate(-1080deg); opacity: 0; }
                100% { transform: scale(1) rotate(0deg); opacity: 1; }
            }
            .adnp-popup-box img { width: 100%; height: auto; display: block; border-radius: 8px; cursor: pointer; }
            .adnp-popup-close {
                position: absolute; top: -18px; right: -18px;
                background: #ff0000; color: #fff; border: 2px solid #fff;
                border-radius: 50%; width: 34px; height: 34px;
                cursor: pointer; font-weight: bold; font-size: 20px;
                display: flex; align-items: center; justify-content: center;
                box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            }
        `;
        const style = document.createElement("style");
        style.id = 'adnp-core-style';
        style.innerHTML = css;
        document.head.appendChild(style);
    }

    // २. विज्ञापन रेन्डर गर्ने मुख्य मल्टिफङ्सन
    window.renderAdNP = function(cfg) {
        // प्रत्येक विज्ञापनको लागि युनिक आइडी (Unique Instance)
        const adId = 'adnp_' + Math.random().toString(36).substr(2, 9);
        
        const overlay = document.createElement('div');
        overlay.className = 'adnp-popup-overlay';
        overlay.id = adId;
        overlay.innerHTML = `
            <div class="adnp-popup-box">
                <button class="adnp-popup-close" onclick="document.getElementById('${adId}').remove()">×</button>
                <div class="adnp-content" style="text-align:center; padding:15px; font-family:sans-serif;">लोड हुँदैछ...</div>
            </div>
        `;
        document.body.appendChild(overlay);

        // ५ सेकेन्डपछि स्वतः बन्द हुने
        const autoClose = setTimeout(() => {
            const currentAd = document.getElementById(adId);
            if(currentAd) currentAd.remove();
        }, 5000);

        // युनिक JSONP क्यालब्याक
        const cb = 'callback_' + adId;
        window[cb] = function(json) {
            if(!json.feed || !json.feed.entry) return;
            
            const entry = json.feed.entry.find(e => 
                e.link.some(l => l.href.toLowerCase().includes(cfg.pageId.toLowerCase()))
            );

            if (entry) {
                const temp = document.createElement('div');
                temp.innerHTML = entry.content.$t;
                const firstImg = temp.querySelector('img');

                if (firstImg) {
                    let fullImg = firstImg.src.replace(/s\d+(-c)?/, 's1600');
                    // लिङ्क प्राथमिकता: १. प्रोपर्टी लिङ्क -> २. ब्लगर एङ्कर -> ३. इमेज लिङ्क (डिफोल्ट)
                    let target = cfg.link || (firstImg.parentElement.tagName === 'A' ? firstImg.parentElement.href : fullImg);

                    const boxContent = overlay.querySelector('.adnp-content');
                    boxContent.style.padding = "0";
                    boxContent.innerHTML = `
                        <a href="${target}" target="_blank">
                            <img src="${fullImg}" alt="Pop-up Ad">
                        </a>
                    `;
                }
            }
        };

        const script = document.createElement('script');
        script.src = `https://adnp.neelamb.com/feeds/pages/default?alt=json-in-script&callback=${cb}`;
        document.body.appendChild(script);
    };
})();

// ३. विज्ञापन कल गर्नुहोस् (Multi-instance safe)
window.onload = function() {
    renderAdNP({
        pageId: 'popup-ad',               // तपाईँको ब्लगर पेज स्लग
        link: 'https://adnp.neelamb.com'   // डिफोल्ट लिङ्क (यदि खाली छोडेमा फोटोकै लिङ्क खुल्छ)
    });
};
</script>
