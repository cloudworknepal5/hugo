<div id="gh-final-master-widget"></div>

<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* १. डाउनलोड बटन स्टाइल */
.gh-download-area {
    max-width: 1000px;
    margin: 10px auto;
    text-align: right; /* बटनलाई दायाँ साइडमा राख्न */
}

.gh-btn-download {
    background: #27ae60;
    color: #fff !important;
    padding: 10px 25px;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Mukta', sans-serif;
    transition: 0.3s;
}
.gh-btn-download:hover { background: #219150; }

/* २. मुख्य फ्रेम कन्टेनर (बाहिरी रातो घेरा) */
.gh-master-wrap {
    max-width: 1000px;
    margin: 0 auto 30px;
    font-family: 'Mukta', sans-serif;
    text-align: center;
    border: 6px solid #ed1c24; 
    padding: 25px;
    background: #fff;
    border-radius: 2px;
    box-sizing: border-box;
}

/* ३. फिचर इमेज एरिया */
.gh-img-frame {
    position: relative;
    width: 100%;
    height: 550px;
    background: #000;
    overflow: hidden;
    line-height: 0;
}

.gh-img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ४. रातो बोर्डर ओभरले (फोटो भित्र) */
.gh-red-overlay {
    position: absolute;
    top: 25px; 
    left: 25px;
    right: 25px;
    bottom: 25px;
    border: 4px solid #ed1c24; 
    z-index: 5;
    pointer-events: none;
}

/* ५. वेबसाइट पट्टी (बोर्डरको माथि) */
.gh-ultra-ribbon {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    background: #ed1c24;
    color: #fff;
    padding: 8px 80px;
    font-size: 24px;
    font-weight: 800;
    z-index: 20;
    border-radius: 3px;
    white-space: nowrap;
}

/* ६. सोसल आइकनहरू */
.gh-social-bottom-overlay {
    position: absolute;
    bottom: -18px;
    left: 45px;
    display: flex;
    gap: 12px;
    z-index: 20;
}

.gh-social-bottom-overlay img {
    width: 28px;
    height: 28px;
    background: #fff;
    padding: 4px;
    border-radius: 50%;
    border: 2px solid #ed1c24;
}

/* ७. हेडलाइन र निलो पट्टी */
.gh-headline-42 {
    display: block;
    font-size: 42px;
    font-weight: 800;
    color: #ed1c24;
    margin: 30px 10px 15px;
    text-decoration: none;
    line-height: 1.2;
}

.gh-footer-strip-blue {
    background: #002e5b;
    color: #fff !important;
    display: inline-block;
    padding: 15px 70px;
    font-weight: 800;
    text-decoration: none;
    font-size: 20px;
    border-radius: 6px;
    margin-bottom: 10px;
}

/* ८. नेभिगेसन */
.gh-nav-flex-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.gh-nav-btn {
    background: #ed1c24;
    color: #fff !important;
    padding: 12px 40px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
}
.gh-nav-btn:disabled { background: #ccc; }

@media (max-width: 768px) {
    .gh-headline-42 { font-size: 28px; }
    .gh-img-frame { height: 350px; }
}
</style>

<script>
/**
 * Ghantaghar TV Multi-function Script with PNG Export
 */
let gh_posts = [];
let gh_idx = 0;

const gh_config = {
    web: "www.ghantaghartv.com",
    label: "पूरा विवरण कमेन्टमा लिंक गरिएको छ ।"
};

function getHD(url) {
    return url.replace('s72-c', 'w1200-h800-c');
}

// PNG डाउनलोड गर्ने फसन
async function downloadAsPNG() {
    const frame = document.querySelector('.gh-master-wrap');
    const btn = document.querySelector('.gh-btn-download');
    
    btn.innerText = "Downloading...";
    
    // html2canvas ले बोर्डर र इमेजलाई एउटै फोटो बनाउँछ
    html2canvas(frame, {
        useCORS: true, // बाहिरी इमेज लोड गर्न
        scale: 2,      // हाई क्वालिटीको लागि
        backgroundColor: "#ffffff"
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `ghantaghar-news-${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        btn.innerText = "Download PNG";
    });
}

function updateUI() {
    const root = document.getElementById('gh-final-master-widget');
    const p = gh_posts[gh_idx];
    
    let title = p.title.$t;
    let link = p.link.find(l => l.rel === 'alternate').href;
    let thumb = p.media$thumbnail ? getHD(p.media$thumbnail.url) : 'https://via.placeholder.com/1200x800';

    root.innerHTML = `
        <div class="gh-download-area">
            <button class="gh-btn-download" onclick="downloadAsPNG()">⬇ Download PNG</button>
        </div>

        <div class="gh-master-wrap">
            <div class="gh-img-frame">
                <a href="${link}"><img src="${thumb}" alt="${title}" crossorigin="anonymous"></a>
                
                <div class="gh-red-overlay">
                    <div class="gh-ultra-ribbon">${gh_config.web}</div>
                    
                    <div class="gh-social-bottom-overlay">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" crossorigin="anonymous">
                        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" crossorigin="anonymous">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" crossorigin="anonymous">
                        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" crossorigin="anonymous">
                    </div>
                </div>
            </div>

            <a href="${link}" class="gh-headline-42">${title}</a>
            <a href="${link}" class="gh-footer-strip-blue">${gh_config.label}</a>
        </div>

        <div class="gh-nav-flex-row">
            <button class="gh-nav-btn" onclick="ghGo(-1)" ${gh_idx === 0 ? 'disabled' : ''}>← Previous</button>
            <button class="gh-nav-btn" onclick="ghGo(1)" ${gh_idx === gh_posts.length - 1 ? 'disabled' : ''}>Next →</button>
        </div>
    `;
}

window.ghFeedCallback = function(json) {
    gh_posts = json.feed.entry || [];
    if(gh_posts.length > 0) updateUI();
};

window.ghGo = function(step) {
    gh_idx += step;
    updateUI();
};

function initGhWidget() {
    const script = document.createElement('script');
    script.src = `https://www.birgunj.eu.org/feeds/posts/default?alt=json-in-script&callback=ghFeedCallback&max-results=50`;
    document.body.appendChild(script);
}

initGhWidget();
</script>
