<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* Layout Framework - Parallel Alignment */
.news-container { 
    font-family: 'Mukta', sans-serif; 
    display: flex; 
    flex-wrap: wrap; 
    gap: 20px; 
    margin: 0; 
    padding: 0; 
    align-items: flex-start; 
}

/* Column Widths */
.news-left { flex: 2; min-width: 320px; }
.news-mid { flex: 1.5; min-width: 280px; }
.news-right { flex: 1; min-width: 250px; }

/* Strict 2-Line Headline */
.clamp-2 { 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden; 
    text-overflow: ellipsis; 
}

/* 1. Main Feature (Left) - 25px Bold */
.big-card { position: relative; height: 420px; border-radius: 6px; overflow: hidden; background: #000; margin: 0; }
.big-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
.big-overlay { position: absolute; bottom: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); width: 100%; box-sizing: border-box; }
.big-overlay a { color: #fff; font-size: 25px; font-weight: 800; text-decoration: none; line-height: 1.2; }

/* 2. Middle Grid - Headline 22px Bold Centered */
.mid-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.mid-item { background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid #f0f0f0; padding-bottom: 10px; text-align: center; }
.mid-item img { width: 100%; height: 110px; object-fit: cover; background: #eee; }
.mid-item a { padding: 10px 5px; display: block; font-size: 22px; font-weight: 700; color: #111; text-decoration: none; line-height: 1.3; }

/* 3. Right Side List - Small Image & Smaller Title (18px) */
.list-item { display: flex; gap: 10px; text-decoration: none; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; align-items: center; }
.list-thumb { width: 85px; height: 60px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: #eee; } /* फोटो अझ सानो (85x60) */
.list-title { font-size: 18px; font-weight: 700; color: #333; line-height: 1.3; } /* टाइटल सानो (18px) */

/* Mobile Optimization */
@media (max-width: 850px) {
    .news-container { flex-direction: column; }
    .news-left, .news-mid, .news-right { width: 100%; flex: none; }
    .big-card { height: 260px; }
    .big-overlay a { font-size: 22px; }
    .mid-item a { font-size: 19px; }
    .list-title { font-size: 17px; }
    .mid-item img { height: 100px; }
}
</style>

<div class="news-container">
    <div class="news-left" id="birgunj-hero"></div>
    <div class="news-mid">
        <div class="mid-grid" id="birgunj-grid"></div>
    </div>
    <div class="news-right" id="birgunj-list"></div>
</div>

<script>
/**
 * Multi-function logic: 
 * - Aligns all columns from top.
 * - Adjusts title and image sizes specifically for the 3rd column.
 */
function renderBirgunjLayout(json) {
    const posts = json.feed.entry;
    if (!posts) return;

    let hero = "", grid = "", list = "";

    posts.forEach((p, i) => {
        const title = p.title.$t;
        const link = p.link.find(l => l.rel === 'alternate').href;
        let img = p.media$thumbnail ? p.media$thumbnail.url.replace('s72-c', 's640') : 'https://via.placeholder.com/600x400';

        if (i === 0) {
            hero = `<div class="big-card"><a href="${link}"><img src="${img}"><div class="big-overlay"><a class="clamp-2">${title}</a></div></a></div>`;
        } else if (i >= 1 && i <= 4) {
            grid += `<div class="mid-item"><a href="${link}"><img src="${img}"><span class="clamp-2">${title}</span></a></div>`;
        } else {
            list += `<a href="${link}" class="list-item"><img src="${img}" class="list-thumb"><span class="list-title clamp-2">${title}</span></a>`;
        }
    });

    document.getElementById('birgunj-hero').innerHTML = hero;
    document.getElementById('birgunj-grid').innerHTML = grid;
    document.getElementById('birgunj-list').innerHTML = list;
}

(function() {
    const labelName = "news"; 
    const script = document.createElement('script');
    script.src = "https://www.birgunj.eu.org/feeds/posts/default/-/" + encodeURIComponent(labelName) + "?alt=json-in-script&max-results=10&callback=renderBirgunjLayout";
    document.body.appendChild(script);
})();
</script>
