<!DOCTYPE html>
<html>
<head>
    <title>25x50 Tight Weather Widget</title>
</head>
<body>

    <div id="weather-widget">
        <div id="icon-box"></div>
        <div id="info-box">
            <div id="temp">--°</div>
            <div id="location">Loading...</div>
        </div>
    </div>

    <script>
        const TightWeather = {
            // १. ग्याप कम गरिएको स्टाइल
            injectStyles: function() {
                const css = `
                    #weather-widget {
                        width: 50px; height: 25px;
                        background: #1e1e1e; color: #fff;
                        border-radius: 4px; display: flex; align-items: center;
                        font-family: Arial, sans-serif; overflow: hidden;
                    }
                    #icon-box {
                        width: 20px; display: flex; align-items: center; justify-content: center;
                    }
                    #icon-box img { width: 18px; height: 18px; }
                    #info-box {
                        flex: 1; display: flex; flex-direction: column;
                        justify-content: center; padding-left: 1px;
                    }
                    #temp { 
                        font-size: 10px; font-weight: bold; 
                        line-height: 0.9; /* ग्याप कम गर्न */
                        color: #ff5722; 
                        margin-bottom: 0px; 
                    }
                    #location { 
                        font-size: 7px; line-height: 1; 
                        white-space: nowrap; opacity: 0.8;
                    }
                `;
                const style = document.createElement("style");
                style.innerText = css;
                document.head.appendChild(style);
            },

            // २. डाटा अपडेट गर्ने फङ्सन
            fetchData: async function(city) {
                const apiKey = "9c17c4095ee2a4042c26bbd4d4de1726";
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    this.render(data);
                } catch (e) {
                    document.getElementById('location').innerText = "Err";
                }
            },

            // ३. UI रेन्डर गर्ने फङ्सन
            render: function(data) {
                const iconCode = data.weather[0].icon;
                document.getElementById('icon-box').innerHTML = `<img src="https://openweathermap.org/img/wn/${iconCode}.png">`;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('location').innerText = data.name.substring(0, 7);
            },

            // इनिट फङ्सन
            init: function(city) {
                this.injectStyles();
                this.fetchData(city);
            }
        };

        TightWeather.init("Kalaiya");
    </script>
</body>
</html>
