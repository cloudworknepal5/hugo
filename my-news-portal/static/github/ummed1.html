<style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap');

    .sidebar-wrapper { 
        font-family: 'Mukta', sans-serif; 
        max-width: 100%; 
        background: #fffafa; 
        padding: 10px; 
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
    }

    /* १. सर्च बार - टपमा */
    .sb-search-container { margin-bottom: 15px; }
    #sb-search-input { 
        width: 100%; padding: 10px 15px; border-radius: 25px; 
        border: 2px solid #cc0000; font-size: 16px; outline: none; box-sizing: border-box;
    }

    .sb-title { 
        background: #cc0000; color: #fff; padding: 8px; 
        text-align: center; font-size: 20px; font-weight: 800; 
        border-radius: 4px; margin-bottom: 15px;
    }

    /* क्षेत्रको नाम - सेन्टरमा */
    .sb-area-header { text-align: center; width: 100%; margin: 15px 0; }
    .sb-area-name {
        background: #e74c3c; color: #fff; padding: 4px 25px; 
        font-size: 17px; font-weight: 700; border-radius: 50px;
        display: inline-block;
    }

    /* २ कोलम ग्रिड */
    .sb-grid {
        display: grid; 
        grid-template-columns: repeat(2, 1fr); 
        gap: 10px; 
        width: 100%;
    }

    /* उम्मेदवार कार्ड र बोर्डर */
    .sb-card { 
        background: #fff; 
        border: 2px solid #cc0000; 
        border-radius: 8px; 
        overflow: hidden; 
        transition: 0.3s;
        display: flex;
        flex-direction: column;
    }
    
    .sb-card:hover { transform: translateY(-3px); box-shadow: 0 5px 12px rgba(0,0,0,0.15); }

    .sb-img-box { position: relative; width: 100%; overflow: hidden; }
    
    /* फोटो जूम */
    .sb-img { 
        width: 100%; 
        height: 200px; 
        object-fit: cover; 
        display: block;
        transition: transform 0.5s;
    }
    .sb-card:hover .sb-img { transform: scale(1.1); }

    .sb-badge {
        position: absolute; right: 5px; bottom: 5px;
        width: 40px; height: 40px; background: #fff; border-radius: 50%;
        padding: 3px; border: 1.5px solid #cc0000; display: flex; align-items: center; justify-content: center;
    }
    .sb-badge img { width: 90%; height: 90%; object-fit: contain; }

    /* विवरण - मुक्ता ८०० वाइड */
    .sb-info { padding: 10px 5px; text-align: center; }
    .sb-name { font-size: 18px; font-weight: 800; color: #1a1a1a; line-height: 1.2; margin-bottom: 4px; }
    .sb-party { font-size: 16px; font-weight: 800; color: #e74c3c; }

    /* डिभाइडर लाइन */
    .sb-divider { border-bottom: 2px dashed #ffcccc; margin: 20px 0; width: 100%; }

    /* २. सोसल मिडिया लिङ्कहरू - पहिलेकै जस्तै */
    .sb-social-footer {
        display: flex; justify-content: center; align-items: center; gap: 10px;
        padding: 10px 0; border-top: 1px solid #eee; 
        margin-top: 10px; flex-wrap: wrap;
    }
    .sb-social-link { display: flex; align-items: center; gap: 5px; text-decoration: none; color: #555; font-weight: bold; font-size: 13px; }
    .sb-social-link img { width: 16px; height: 16px; }

    /* ३. लोड मोर - सबैभन्दा अन्तिममा */
    .sb-load-box { text-align: center; margin-top: 10px; }
    #sb-load-btn {
        background: #2c3e50; color: #fff; border: none; padding: 10px; 
        font-size: 14px; font-weight: 800; border-radius: 30px; cursor: pointer; width: 100%;
    }
    #sb-load-btn:hover { background: #cc0000; }
</style>

<div class="sidebar-wrapper">
    <div class="sb-search-container">
        <input type="text" id="sb-search-input" placeholder="खोज्नुहोस्..." oninput="sbFilter()">
    </div>

    <div class="sb-title">हेभिवेट उम्मेदवार</div>

    <div id="sb-portal">लोड हुँदैछ...</div>

    <div class="sb-social-footer">
        <a href="#" class="sb-social-link"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png"> ghantagharTV</a>
        <a href="#" class="sb-social-link"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"> ghantagharTV</a>
    </div>

    <div class="sb-load-box">
        <button id="sb-load-btn" onclick="sbMore()">थप हेर्नुहोस् (Load More)</button>
    </div>
</div>

<script>
let sbRaw = [];
let sbActive = [];
let sbLimit = 1; 

// मल्टि-फंक्सन सिंक
function sbSync() {
    const s = document.createElement('script');
    s.src = "https://www.election.neelamb.com/feeds/posts/default?alt=json-in-script&callback=sbBuild&max-results=100&t=" + new Date().getTime();
    document.body.appendChild(s);
}

function sbBuild(json) {
    const entries = json.feed.entry || [];
    const processed = entries.map(e => {
        const labels = e.category ? e.category.map(cat => cat.term) : [];
        const photo = e.media$thumbnail ? e.media$thumbnail.url.replace('s72-c', 's800') : '';
        let sign = '';
        if (e.content && e.content.$t) {
            const div = document.createElement('div');
            div.innerHTML = e.content.$t;
            const imgs = div.getElementsByTagName('img');
            if (imgs.length > 1) sign = imgs[1].src;
        }
        return { name: e.title.$t, party: labels[1] || "स्वतन्त्र", area: labels[0] || "अन्य", photo: photo, sign: sign };
    });

    const grouped = {};
    processed.forEach(item => {
        if (!grouped[item.area]) grouped[item.area] = [];
        grouped[item.area].push(item);
    });

    sbRaw = Object.keys(grouped).map(area => ({ area: area, candidates: grouped[area] }));
    sbActive = [...sbRaw];
    sbRender();
}

function sbRender() {
    const container = document.getElementById('sb-portal');
    const btn = document.getElementById('sb-load-btn');
    let html = '';
    
    sbActive.slice(0, sbLimit).forEach(group => {
        html += `<div class="sb-area-header"><div class="sb-area-name">${group.area}</div></div>
                 <div class="sb-grid">`;
        group.candidates.slice(0, 2).forEach(c => { 
            html += `
            <div class="sb-card">
                <div class="sb-img-box">
                    <img src="${c.photo}" class="sb-img" loading="lazy">
                    ${c.sign ? `<div class="sb-badge"><img src="${c.sign}"></div>` : ''}
                </div>
                <div class="sb-info">
                    <div class="sb-name">${c.name}</div>
                    <div class="sb-party">${c.party}</div>
                </div>
            </div>`;
        });
        html += `</div><div class="sb-divider"></div>`;
    });

    container.innerHTML = html || "डाटा फेला परेन";
    if(btn) btn.style.display = (sbLimit >= sbActive.length) ? 'none' : 'block';
}

function sbFilter() {
    const term = document.getElementById('sb-search-input').value.toLowerCase();
    sbActive = sbRaw.filter(g => g.area.toLowerCase().includes(term) || g.candidates.some(c => c.name.toLowerCase().includes(term)));
    sbLimit = 1;
    sbRender();
}

function sbMore() { sbLimit++; sbRender(); }

setInterval(sbSync, 300000);
sbSync();
</script>
