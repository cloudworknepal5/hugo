<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रो डोमेन म्यानेजर - निलम्ब आर्ट एण्ड डिजाइन</title>
    <style>
        :root { 
            --bg: #f4f7f6; --primary: #fbbc04; --card: #ffffff; 
            --danger: #d93025; --warning: #f57c00; --active: #2e7d32;
            --gmail: #ea4335; --whatsapp: #25d366; --messenger: #0084ff; --backup: #673ab7; 
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; overflow: hidden; }

        .dashboard-wrapper { 
            display: grid; 
            grid-template-columns: 25% 25% 50%; 
            height: 100vh; 
            box-sizing: border-box;
        }

        @media (max-width: 1000px) {
            .dashboard-wrapper { grid-template-columns: 1fr; height: auto; overflow: auto; }
            .col { height: auto !important; }
        }

        .col { padding: 20px; overflow-y: auto; height: 100vh; border-right: 1px solid #ddd; box-sizing: border-box; }

        .col-title { 
            font-size: 15px; font-weight: bold; padding: 12px; margin-bottom: 15px;
            background: #fff; border-radius: 8px; border-bottom: 3px solid #eee;
            position: sticky; top: 0; z-index: 10; text-align: center;
        }

        .card-style { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .expired-card { border-top: 3px solid var(--danger); }
        .near-card { border-top: 3px solid var(--warning); }

        .form-section { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); margin-bottom: 30px; }
        #searchBox { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; margin-bottom: 20px; outline: none; font-size: 15px; }
        
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group input, .input-group textarea { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 8px 0; outline: none; font-size: 13px; }
        .full-width { grid-column: span 2; }
        
        .domain-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #fffde7; padding: 10px; border-radius: 8px; margin-top: 10px; }
        
        .main-notes-list { display: flex; flex-direction: column; gap: 15px; }
        .note-item { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e0e0e0; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .note-title { font-size: 19px; font-weight: 700; color: #1a73e8; margin-bottom: 5px; }

        .social-btns { display: flex; gap: 5px; margin-top: 10px; }
        .social-btn { flex: 1; text-align: center; color: white; padding: 8px 2px; border-radius: 6px; text-decoration: none; font-size: 10px; font-weight: bold; transition: 0.2s; }
        .btn-gmail { background: var(--gmail); }
        .btn-wa { background: var(--whatsapp); }
        .btn-ms { background: var(--messenger); }

        .delete-btn, .edit-btn { position: absolute; top: 12px; cursor: pointer; border: none; background: #f5f5f5; width: 28px; height: 28px; border-radius: 50%; color: #888; }
        .delete-btn { right: 12px; }
        .edit-btn { right: 45px; }

        .backup-btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; color: #fff; font-size: 11px; font-weight: bold; margin: 0 5px; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="col">
        <div class="col-title" style="color:var(--warning)">⚠️ सकिन बाँकी (६० दिन)</div>
        <div id="nearExpireList"></div>
    </aside>

    <section class="col">
        <div class="col-title" style="color:var(--danger)">🚫 एक्सपायर भइसकेका</div>
        <div id="expiredArea"></div>
    </section>

    <main class="col" style="background:#fcfcfc; border-right:none;">
        <div class="col-title">📝 व्यवस्थापन प्यानल</div>
        
        <input type="text" id="searchBox" placeholder="वेबसाइट वा क्लाइन्टको नामबाट खोज्नुहोस्...">

        <div class="form-section">
            <input type="hidden" id="editId">
            <div class="input-group">
                <input type="text" id="noteTitle" placeholder="वेबसाइटको URL" class="full-width">
                <input type="text" id="authName" placeholder="क्लाइन्टको नाम">
                <input type="text" id="authMobile" placeholder="मोबाइल नं.">
                <input type="text" id="authAddress" placeholder="ठेगाना">
                <input type="email" id="authGmail" placeholder="इमेल ठेगाना">
                <textarea id="noteContent" placeholder="थप केही विवरण..." rows="2" class="full-width"></textarea>
            </div>
            <div class="domain-inputs">
                <div><label style="font-size:9px">रजिष्ट्रेशन</label><input type="date" id="regDate" style="width:100%"></div>
                <div><label style="font-size:9px">एक्सपायर</label><input type="date" id="expDate" style="width:100%"></div>
                <div><label style="font-size:9px">रिमाइन्डर</label><input type="date" id="remDate" style="width:100%"></div>
                <div><label style="font-size:9px">रङ</label><input type="color" id="noteColor" value="#333333" style="width:100%; height:20px; border:none;"></div>
            </div>
            <button id="saveBtn" style="width:100%; background:var(--active); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:15px;" onclick="noteApp.actions.save()">डाटा सुरक्षित गर्नुहोस्</button>
            
            <div style="margin-top:15px; text-align: center;">
                <button class="backup-btn" style="background:var(--backup)" onclick="noteApp.actions.exportData()">📤 Export</button>
                <button class="backup-btn" style="background:#444" onclick="document.getElementById('importFile').click()">📥 Import</button>
                <input type="file" id="importFile" style="display:none" onchange="noteApp.actions.importData(event)">
            </div>
        </div>

        <h4 style="margin: 0 0 15px 5px; color:#555; border-left:4px solid var(--active); padding-left:10px;">वेबसाइटहरूको पूर्ण सूची</h4>
        <div id="mainNotesList" class="main-notes-list"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, updateDoc, doc, query } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWl62upbxsBTx1ICx8jbtmN_vVZrx_6UU",
        authDomain: "keep-977cc.firebaseapp.com",
        projectId: "keep-977cc",
        storageBucket: "keep-977cc.firebasestorage.app",
        messagingSenderId: "281172709411",
        appId: "1:281172709411:web:7b2748b12825d04e20e196"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const notesCol = collection(db, "myNotes");

    window.noteApp = {
        allData: [],
        actions: {
            save: async function() {
                const id = document.getElementById('editId').value;
                const data = {
                    title: document.getElementById('noteTitle').value,
                    authName: document.getElementById('authName').value,
                    authAddress: document.getElementById('authAddress').value,
                    authMobile: document.getElementById('authMobile').value,
                    authGmail: document.getElementById('authGmail').value,
                    content: document.getElementById('noteContent').value,
                    regDate: document.getElementById('regDate').value,
                    expDate: document.getElementById('expDate').value,
                    remDate: document.getElementById('remDate').value,
                    color: document.getElementById('noteColor').value,
                    updatedAt: Date.now()
                };
                if(!data.title) return alert("URL अनिवार्य छ!");
                if(id) await updateDoc(doc(db, "myNotes", id), data);
                else { data.createdAt = Date.now(); await addDoc(notesCol, data); }
                noteApp.actions.clear();
            },
            clear: () => {
                ['editId','noteTitle','authName','authAddress','authMobile','authGmail','noteContent','regDate','expDate','remDate'].forEach(i => document.getElementById(i).value = '');
                document.getElementById('saveBtn').innerText = "सुरक्षित गर्नुहोस्";
            },
            exportData: () => {
                const blob = new Blob([JSON.stringify(noteApp.allData)], {type:'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
            },
            importData: (e) => {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const items = JSON.parse(ev.target.result);
                    for(let i of items) { delete i.id; await addDoc(notesCol, i); }
                };
                reader.readAsText(e.target.files[0]);
            },
            edit: (id) => {
                const n = noteApp.allData.find(x => x.id === id);
                if(n) {
                    document.getElementById('editId').value = id;
                    document.getElementById('noteTitle').value = n.title;
                    document.getElementById('authName').value = n.authName || '';
                    document.getElementById('authAddress').value = n.authAddress || '';
                    document.getElementById('authMobile').value = n.authMobile || '';
                    document.getElementById('authGmail').value = n.authGmail || '';
                    document.getElementById('noteContent').value = n.content || '';
                    document.getElementById('expDate').value = n.expDate || '';
                    document.getElementById('regDate').value = n.regDate || '';
                    document.getElementById('remDate').value = n.remDate || '';
                    document.getElementById('noteColor').value = n.color || '#333333';
                    document.getElementById('saveBtn').innerText = "अपडेट गर्नुहोस्";
                }
            },
            delete: async (id) => { if(confirm("डिलेट गर्ने निश्चित हुनुहुन्छ?")) await deleteDoc(doc(db, "myNotes", id)); }
        },
        render: function(notes) {
            const expiredArea = document.getElementById('expiredArea');
            const nearL = document.getElementById('nearExpireList');
            const mainL = document.getElementById('mainNotesList');
            expiredArea.innerHTML = ''; nearL.innerHTML = ''; mainL.innerHTML = '';
            
            const now = new Date(); now.setHours(0,0,0,0);

            notes.forEach(n => {
                let diff = 0;
                if(n.expDate) {
                    const d = new Date(n.expDate);
                    diff = Math.ceil((d - now) / (1000*60*60*24));
                }

                let dayStatus = diff >= 0 ? `${diff} दिन बाँकी छ` : `${Math.abs(diff)} दिन पहिले सकिएको छ`;
                const subject = encodeURIComponent("तपाईंको वेबसाइट एक्सपायर हुँदैछ - नवीकरण सूचना");
                const bodyText = `नमस्ते ${n.authName || 'क्लाइन्ट'},\n\nतपाईंको वेबसाइट (${n.title}) को म्याद ${n.expDate} मा सकिएको छ । आजको मितिबाट गणना गर्दा ${dayStatus}।\n\nकृपया एक्सपायर हुनुभन्दा एक साता अगावै नवीकरण गरेर सेवा सुचारु राख्नुहोला।\n\nसम्पर्कको लागि:\nNeelamb\nArt and Design\nhttps://neelamb.com\n+9779814272487`;
                const encodedBody = encodeURIComponent(bodyText);
                const wa = (n.authMobile||'').replace(/\D/g,'');

                const socialHtml = `
                    <div class="social-btns">
                        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=${n.authGmail}&su=${subject}&body=${encodedBody}" target="_blank" class="social-btn btn-gmail">Gmail</a>
                        <a href="https://wa.me/${wa.length==10?'977'+wa:wa}?text=${encodedBody}" target="_blank" class="social-btn btn-wa">WA</a>
                        <a href="https://www.facebook.com/messages/t/" target="_blank" class="social-btn btn-ms">MS</a>
                    </div>`;

                if(diff >= 0 && diff <= 60) {
                    nearL.innerHTML += `
                        <div class="card-style near-card">
                            <button class="edit-btn" style="top:8px; right:10px; width:22px; height:22px; font-size:12px;" onclick="noteApp.actions.edit('${n.id}')">✏️</button>
                            <span style="font-weight:bold; font-size:13px;">${n.title}</span><br>
                            <small>${diff} दिन बाँकी (${n.expDate})</small>
                            ${socialHtml}
                        </div>`;
                }

                if(diff < 0) {
                    expiredArea.innerHTML += `
                        <div class="card-style expired-card">
                            <button class="edit-btn" onclick="noteApp.actions.edit('${n.id}')">✏️</button>
                            <span style="font-weight:bold; color:var(--danger)">${n.title}</span><br>
                            <small>${Math.abs(diff)} दिन पहिले सकिएको</small><br>
                            <small style="color:#666; font-size:10px;">📅 मिति: ${n.expDate}</small>
                            ${socialHtml}
                        </div>`;
                }

                mainL.innerHTML += `
                    <div class="note-item">
                        <button class="delete-btn" onclick="noteApp.actions.delete('${n.id}')">×</button>
                        <button class="edit-btn" onclick="noteApp.actions.edit('${n.id}')">✏️</button>
                        <div class="note-title" style="color:${n.color}">${n.title}</div>
                        <div style="font-size:13px; color:#555;">👤 ${n.authName || '-'} | 📞 ${n.authMobile || '-'}</div>
                        <div style="font-size:12px; color:#666; margin-top:3px;">📍 ठेगाना: ${n.authAddress || '-'}</div>
                        <div style="font-size:11px; color:#888; margin-top:5px;"><b>एक्सपायर मिति:</b> ${n.expDate || '-'}</div>
                        ${socialHtml}
                    </div>`;
            });
        }
    };

    onSnapshot(query(notesCol), (snap) => {
        noteApp.allData = snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b) => (b.updatedAt||0)-(a.updatedAt||0));
        noteApp.render(noteApp.allData);
    });

    document.getElementById('searchBox').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const f = noteApp.allData.filter(n => (n.title||'').toLowerCase().includes(q) || (n.authName||'').toLowerCase().includes(q));
        noteApp.render(f);
    });
</script>

</body>
</html>
