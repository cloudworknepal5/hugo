<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali News Tool - Complete 2026</title>
    
    <script src="https://ad.neelamb.com/feeds/index_files/jquery.download"></script>
    <script src="https://ad.neelamb.com/feeds/index_files/jquery_002.download"></script>
    <script src="https://ad.neelamb.com/feeds/index_files/common.download"></script>
    <script src="https://ad.neelamb.com/feeds/index_files/convert.download"></script>
    <script src="https://ad.neelamb.com/feeds/index_files/kantipur.js.download"></script>

    <style>
        :root { --primary: #e74c3c; --accent: #4e73df; --bg: #f4f7f6; --dark: #2c3e50; --rtf: #8e44ad; --gmail: #d44638; --card: #ffffff; }
        .dark-mode { --bg: #18191a; --card: #242526; --text: #e4e6eb; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Converter Section */
        .top-editor { background: white; padding: 10px; border-bottom: 3px solid var(--primary); flex-shrink: 0; z-index: 100; }
        .converter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        textarea { width: 100%; height: 100px; border: 1px solid #ccc; border-radius: 5px; padding: 8px; font-size: 14px; box-sizing: border-box; resize: none; }
        h3 { font-size: 10px; margin: 0 0 5px; color: var(--accent); text-transform: uppercase; }
        .btn-row { display: flex; gap: 4px; margin-top: 5px; }
        .btn-tool { flex: 1; padding: 5px; font-size: 10px; border: none; border-radius: 3px; cursor: pointer; color: white; font-weight: bold; }
        .btn-conv { background: #4e73df; } .btn-copy { background: #27ae60; } .btn-clear { background: #7f8c8d; } .btn-rtf { background: var(--rtf); }

        /* Control Panel */
        .control-panel { background: var(--dark); padding: 8px; display: flex; gap: 8px; justify-content: center; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
        .input-box { padding: 6px 10px; border-radius: 4px; border: none; font-size: 12px; width: 160px; }
        .btn-action { background: #27ae60; color: white; border: none; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-blue { background: #3498db; } .btn-rss { background: #f39c12; } .btn-gmail { background: var(--gmail); }

        /* Navigation / Feed Shortcuts */
        .feed-shortcuts { background: #fff; padding: 5px; border-bottom: 1px solid #ddd; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; flex-shrink: 0; }
        .btn-feed { background: #f8f9fa; border: 1px solid #ddd; padding: 4px 10px; border-radius: 15px; cursor: pointer; font-size: 11px; }
        .btn-feed.active { background: var(--primary); color: white; }

        /* Split View Layout */
        .split-view { display: flex; flex: 1; overflow: hidden; background: #ccc; }
        .left-panel { width: 40%; background: white; overflow-y: auto; padding: 10px; border-right: 2px solid #ddd; box-sizing: border-box; }
        .right-panel { width: 60%; background: #eee; overflow-y: auto; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .post-card { border: 1px solid #eee; padding: 8px; border-radius: 6px; background: #fff; display: flex; flex-direction: column; }
        .f-img { width: 100%; height: 85px; object-fit: cover; border-radius: 4px; }
        .post-title { font-size: 11px; font-weight: bold; color: #333; height: 32px; overflow: hidden; text-decoration: none; margin: 5px 0; }
        
        /* Embed Section */
        .bottom-grid { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .embed-card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .embed-container { width: 100%; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; background: white; }

        #copy-status { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 50px; display: none; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<div id="copy-status">सफलतापूर्वक कपी भयो! ✅</div>

<div class="top-editor">
    <div class="converter-grid">
        <div class="card">
            <h3>१. Unicode</h3>
            <textarea id="unicode_text" oninput="autoProcess()"></textarea>
            <div class="btn-row">
                <button class="btn-tool btn-copy" onclick="copyTool('unicode_text')">Copy</button>
                <button class="btn-tool btn-clear" onclick="clearAllTools()">Clear All</button>
            </div>
        </div>
        <div class="card">
            <h3>२. Preeti</h3>
            <textarea id="legacy_text" style="font-family:'preeti';"></textarea>
            <div class="btn-row">
                <button class="btn-tool btn-copy" onclick="copyTool('legacy_text')">Copy</button>
            </div>
        </div>
        <div class="card">
            <h3>३. Himalb (Auto Copy)</h3>
            <textarea id="himalb_output" style="font-family:'himalb';"></textarea>
            <div class="btn-row">
                <button class="btn-tool btn-rtf" onclick="downloadRTF()">Download RTF</button>
                <button class="btn-tool btn-copy" onclick="copyTool('himalb_output')">Copy</button>
            </div>
        </div>
    </div>
</div>

<div class="control-panel">
    <button class="btn-action btn-rss" onclick="openRSSPopup()">RSS NEPAL POPUP</button>
    <input type="text" id="custom_rss" class="input-box" placeholder="फिड (RSS) लिंक...">
    <button class="btn-action" onclick="newsManager.fetchFeed(document.getElementById('custom_rss').value)">फिड लोड</button>
    <input type="text" id="browser_url" class="input-box" placeholder="URL यहाँ...">
    <button class="btn-action btn-blue" onclick="loadBrowser()">वेबसाइट लोड</button>
    <button class="btn-action btn-gmail" onclick="window.open('https://mail.google.com/mail/u/0/?ui=2&fs=1&tf=cm', '_blank')">GMAIL</button>
    <button class="btn-action btn-blue" onclick="document.body.classList.toggle('dark-mode')">Dark Mode</button>
</div>

<div class="feed-shortcuts" id="feed-buttons"></div>

<div class="split-view">
    <div class="left-panel">
        <input type="text" id="searchInput" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;" placeholder="समाचार खोज्नुहोस्..." onkeyup="newsManager.searchNews()">
        <div id="news-grid" class="news-grid">
            <p style="grid-column: span 2; text-align:center; padding: 20px;">फिड लोड गर्नुहोस्।</p>
        </div>
    </div>

    <div class="right-panel">
        <div class="bottom-grid">
             <div class="embed-card">
                <h2>Preeti to Unicode Auto</h2>
                <div class="embed-container" style="height: 400px;"> 
                     <embed src="https://designers2077.github.io/PreetiToUnicodeAuto/" width="100%" height="100%">
                </div>
            </div>
            <div class="embed-card">
                <h2>News Editor</h2>
                <div class="embed-container" style="height: 400px;">
                    <embed src="https://designers2077.github.io/newseditor/" width="100%" height="100%">
                </div>
            </div>
        </div>
        <div style="height:600px; border-top:5px solid var(--dark);">
            <iframe id="web_frame" name="web_frame" src="about:blank" style="width:100%; height:100%; border:none; background:white;"></iframe>
        </div>
    </div>
</div>

<script>
class NewsManager {
    constructor() {
        this.allNews = [];
        this.feeds = [
            { name: "Nepal Post", url: "https://nepalpostdaily.com/feed/" },
            { name: "Madhes Khabar", url: "https://feeds.feedburner.com/madheskhabar/pLihKdgaoDx" },
            { name: "Race Khabar", url: "https://racekhabar.com/feed/" },
            { name: "E-Shilalekh", url: "https://www.eshilalekh.com/feed" },
            { name: "Madhesh Sanchar", url: "https://madheshsanchar.com/feed" },
            { name: "Chandra Surya", url: "https://feeds.feedburner.com/chandrasuryawani/8iC1d0yoofl" }
        ];
        this.initButtons();
    }

    initButtons() {
        const btnContainer = document.getElementById('feed-buttons');
        this.feeds.forEach(f => {
            const btn = document.createElement('button');
            btn.className = 'btn-feed';
            btn.innerText = f.name;
            btn.onclick = () => this.fetchFeed(f.url);
            btnContainer.appendChild(btn);
        });
    }

    async fetchFeed(url) {
        if(!url) return;
        const grid = document.getElementById('news-grid');
        grid.innerHTML = "<p style='grid-column: span 2; text-align:center;'>तानिँदैछ...</p>";
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&cache_boost=${Date.now()}`);
            const data = await res.json();
            if (data.status === "ok") {
                this.allNews = data.items;
                this.render(this.allNews);
            }
        } catch (e) { grid.innerHTML = "Error!"; }
    }

    cleanHTML(html) {
        const div = document.createElement("div");
        div.innerHTML = html;
        return div.innerText || div.textContent || "";
    }

    // MULTI-FUNCTION: Clean + Add + Convert + Copy
    processAndAdd(index) {
        const item = this.allNews[index];
        const content = this.cleanHTML(item.content || item.description);
        const box = document.getElementById('unicode_text');
        
        box.value += (box.value ? "\n\n━━━━━━━━━\n\n" : "") + `📌 ${item.title}\n\n${content}`;
        
        autoProcess(); // Conversion Pipeline
        
        setTimeout(() => {
            copyTool('himalb_output');
            showStatus("Himalb अटो कपी भयो! ✅");
        }, 800);
    }

    searchNews() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = this.allNews.filter(item => item.title.toLowerCase().includes(query));
        this.render(filtered);
    }

    render(items) {
        const grid = document.getElementById('news-grid');
        grid.innerHTML = "";
        items.forEach((item, i) => {
            const img = item.thumbnail || "https://via.placeholder.com/150x100?text=News";
            grid.innerHTML += `
                <div class="post-card">
                    <img src="${img}" class="f-img">
                    <a href="${item.link}" target="web_frame" class="post-title">${item.title}</a>
                    <button class="btn-action" style="font-size:10px; padding:5px;" onclick="newsManager.processAndAdd(${i})">थप्नुहोस् +</button>
                </div>`;
        });
    }
}

// Global Core Functions
function autoProcess() {
    if (typeof convert_to_Preeti === "function") convert_to_Preeti(); 
    setTimeout(() => {
        const preetiVal = document.getElementById('legacy_text').value;
        if (typeof kantipurConfigToUnicode === "function" && preetiVal) {
            document.getElementById('himalb_output').value = kantipurConfigToUnicode(preetiVal);
        }
    }, 400);
}

function copyTool(id) {
    const box = document.getElementById(id);
    if(box.value) {
        box.select();
        document.execCommand('copy');
        showStatus("कपी भयो! ✅");
    }
}

function showStatus(msg) {
    const s = document.getElementById('copy-status');
    s.innerText = msg; s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 2000);
}

function loadBrowser() {
    let url = document.getElementById('browser_url').value;
    if(url) document.getElementById('web_frame').src = url.startsWith('http') ? url : 'https://' + url;
}

function clearAllTools() {
    ['unicode_text', 'legacy_text', 'himalb_output'].forEach(id => document.getElementById(id).value = "");
}

function downloadRTF() {
    const text = document.getElementById('himalb_output').value;
    if(!text) return;
    const blob = new Blob(["{\\rtf1\\ansi\\deff0 {\\fonttbl {\\f0 Himalb;}}\\f0 " + text + "}"], {type: 'application/rtf'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = "News_" + Date.now() + ".rtf";
    link.click();
}

function openRSSPopup() {
    window.open("http://rssnepal.org.np/headlineNews/list?type=TEXT_NEPALI", 'RSS', 'width=1000,height=600');
}

const newsManager = new NewsManager();
</script>
</body>
</html>
