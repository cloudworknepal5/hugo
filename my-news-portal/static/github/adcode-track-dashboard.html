<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeelamB Analytics Pro v4.8</title>
    <style>
        :root { --blue: #1a73e8; --pink: #e91e63; --bg: #f1f3f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .stats { display: flex; gap: 15px; margin-bottom: 25px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .table-box { background: #fff; padding: 20px; border-radius: 10px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: 12px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .badge { padding: 4px 8px; border-radius: 4px; color: #fff; font-weight: bold; }
        .VIEW { background: var(--blue); } .CLICK { background: var(--pink); }
        .img-thumb { width: 50px; height: 30px; object-fit: cover; border-radius: 3px; border: 1px solid #ddd; }
        .link-url { color: var(--blue); text-decoration: none; display: block; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="stats">
        <div class="card" style="border-top: 5px solid var(--blue);"><h3>Impressions</h3><p id="totalV" style="font-size:24px; font-weight:bold; color:var(--blue);">0</p></div>
        <div class="card" style="border-top: 5px solid var(--pink);"><h3>Clicks</h3><p id="totalC" style="font-size:24px; font-weight:bold; color:var(--pink);">0</p></div>
        <div class="card" style="border-top: 5px solid #2ecc71;"><h3>CTR</h3><p id="ctr" style="font-size:24px; font-weight:bold; color:#2ecc71;">0%</p></div>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Event</th>
                    <th>Ad ID</th>
                    <th>Image</th>
                    <th>Target Link</th>
                    <th>IP Address</th>
                    <th>Country</th>
                    <th>City</th>
                    <th>Platform</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
        <button id="loadBtn" onclick="render()" style="margin:20px auto; display:block; padding:10px 30px; cursor:pointer;">Load More</button>
    </div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbwIEUX7nS_iBTJfwG4G6RVnalfNLracsAQZlZl9m78M3_Fkmwug63h8QnfrgA2xQ-8azA/exec';
    let records = [], offset = 0;

    async function loadData() {
        const res = await fetch(API);
        const data = await res.json();
        document.getElementById('totalV').innerText = data.summary.views;
        document.getElementById('totalC').innerText = data.summary.clicks;
        document.getElementById('ctr').innerText = data.summary.ctr;
        records = data.logs.reverse();
        render();
    }

    function render() {
        const tbody = document.getElementById('logBody');
        const batch = records.slice(offset, offset + 15);
        batch.forEach(r => {
            const row = `<tr>
                <td><small>${new Date(r.timestamp).toLocaleString()}</small></td>
                <td><span class="badge ${r.event}">${r.event}</span></td>
                <td><code>${r.adId}</code></td>
                <td><a href="${r.imageUrl}" target="_blank"><img src="${r.imageUrl}" class="img-thumb"></a></td>
                <td><a href="${r.targetLink}" class="link-url" target="_blank">${r.targetLink}</a></td>
                <td><small>${r.ip}</small></td>
                <td>${r.country}</td>
                <td>${r.city}</td>
                <td><small style="background:#eee; padding:2px 5px; border-radius:3px;">${r.platform}</small></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        });
        offset += 15;
        if (offset >= records.length) document.getElementById('loadBtn').style.display = 'none';
    }
    window.onload = loadData;
</script>
</body>
</html>
