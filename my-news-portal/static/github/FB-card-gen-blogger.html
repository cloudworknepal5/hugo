<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birgunj News Generator - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    
    <style>
        :root { --fb-red: #ed1c24; --fb-blue: #002e5b; }
        body { background: #f4f4f4; margin: 0; padding: 0; font-family: 'Mukta', sans-serif; }
        #gh-outer-wrapper { width: 100%; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .gh-instructions { background: #fff3f3; border-left: 5px solid var(--fb-red); padding: 15px; margin: 20px auto; width: 90%; max-width: 800px; border-radius: 8px; font-size: 16px; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .gh-controls-panel { background: #fff; padding: 20px; border-bottom: 1px solid #ddd; width: 100%; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .gh-controls-panel select, .gh-controls-panel input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-family: 'Mukta'; }
        .gh-dynamic-inputs { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; }
        #gh-master-container { transform-origin: top center; transition: transform 0.2s ease-out; margin: 20px 0; padding: 10px; }
        .gh-master-wrap { width: 1200px; height: 630px; background: #fff; border: 15px solid var(--fb-red); box-sizing: border-box; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .gh-logo-watermark { position: absolute; top: 30px; right: 25px; width: 150px; height: auto; z-index: 100; object-fit: contain; pointer-events: none; }
        .gh-img-frame { position: relative; width: 100%; flex: 1; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .draggable-img { position: absolute; will-change: transform; cursor: move; max-width: none; }
        .gh-red-overlay { position: absolute; inset: 12px; border: 2px solid rgba(237, 28, 36, 0.4); z-index: 10; pointer-events: none; }
        .gh-small-ribbon { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--fb-red); color: #fff; padding: 3px 35px; font-size: 16px; font-weight: 700; z-index: 20; border-radius: 3px; }
        .gh-social-icons { position: absolute; bottom: 15px; left: 20px; display: flex; gap: 10px; z-index: 110; }
        .gh-social-icons img { width: 42px; height: 42px; background: #fff; padding: 8px; border-radius: 50%; border: 1px solid var(--fb-red); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .gh-headline { padding: 10px 40px; font-weight: 800; color: var(--fb-red); line-height: 1.15; text-align: center; background: #fff; min-height: 140px; display: flex; align-items: center; justify-content: center; z-index: 5; font-size: 58px; overflow: hidden; }
        .gh-nav-row { display: flex; justify-content: center; gap: 15px; margin: 20px 0; width: 100%; }
        .gh-nav-btn { background: var(--fb-red); color: #fff; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 18px; }
        .gh-nav-btn:disabled { background: #ccc; }
        .zoom-ctrl { display: flex; align-items: center; gap: 10px; background: #eee; padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="gh-outer-wrapper">
    <div class="gh-instructions">
        <b><i class="fas fa-bullhorn"></i> Birgunj Feed Alert:</b> 
        तपाईंको फिड सफलतापूर्वक सेट गरिएको छ। प्रोक्सी प्रयोग भएकाले समाचार लोड हुन केही सेकेन्ड लाग्न सक्छ।
    </div>

    <div class="gh-controls-panel">
        <select id="formatSelector" onchange="changeFormat()">
            <option value="landscape" data-w="1200" data-h="630">Facebook Landscape (1200x630)</option>
            <option value="square" data-w="1200" data-h="1200">Facebook Square (1200x1200)</option>
            <option value="portrait" data-w="1080" data-h="1350">Facebook Portrait (1080x1350)</option>
            <option value="stories" data-w="1080" data-h="1920">Stories / Reels (1080x1920)</option>
        </select>

        <div class="zoom-ctrl">
            <i class="fas fa-search-minus"></i>
            <input type="range" id="imgZoom" min="0.5" max="4" step="0.1" value="1" oninput="applyTransform()">
            <i class="fas fa-search-plus"></i>
        </div>

        <button onclick="capturePNG()" style="background: #28a745; color: white; padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer;">
            <i class="fas fa-download"></i> HD डाउनलोड
        </button>

        <div class="gh-dynamic-inputs">
            <input type="text" id="inputDomain" placeholder="Domain" value="www.birgunj.eu.org">
            <input type="text" id="inputLogo" placeholder="Logo URL" value="https://nepaltopkhabar.com/wp-content/uploads/2025/09/logo11-copy-300x84.png">
            <input type="text" id="inputFeed" placeholder="Feed URL" value="https://www.birgunj.eu.org/feeds/posts/default?alt=json">
            <button onclick="updateSettings()" style="background: #002e5b; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer;">
                <i class="fas fa-sync-alt"></i> Update News
            </button>
        </div>
    </div>

    <div id="gh-master-container"></div>
</div>

<script>
let gh_posts_data = [];
let gh_current_idx = 0;
let imgState = { x: 0, y: 0, scale: 1 };
let SITE_DOMAIN = "www.birgunj.eu.org";
let SITE_LOGO_URL = "https://nepaltopkhabar.com/wp-content/uploads/2025/09/logo11-copy-300x84.png";

/** Multi-Function: Update & Auto-Format Feed **/
function updateSettings() {
    const d = document.getElementById('inputDomain').value.trim();
    const l = document.getElementById('inputLogo').value.trim();
    let f = document.getElementById('inputFeed').value.trim();

    if(d) SITE_DOMAIN = d;
    if(l) SITE_LOGO_URL = l;

    // Blogger Feed Optimization (Ensuring JSON format)
    if(f.includes("feeds/posts/default") && !f.includes("alt=json")) {
        f += (f.includes("?") ? "&" : "?") + "alt=json";
    }
    
    loadData(f);
}

/** Multi-Function: Data Fetcher with CORS Proxy **/
async function loadData(url) {
    // AllOrigins Proxy for avoiding CORS issues
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    
    try {
        const res = await fetch(proxy);
        const data = await res.json();
        const json = JSON.parse(data.contents);
        
        // Handling Blogger JSON structure
        if (json.feed && json.feed.entry) {
            gh_posts_data = json.feed.entry;
            gh_current_idx = 0;
            updateDisplay(true);
        } else if (Array.isArray(json)) {
            gh_posts_data = json;
            gh_current_idx = 0;
            updateDisplay(false);
        } else {
            alert("No data found in feed.");
        }
    } catch (err) {
        alert("लोड गर्न सकिएन। प्रोक्सी सर्भर व्यस्त हुन सक्छ, फेरि Update थिच्नुहोस्।");
    }
}

/** Multi-Function: UI Renderer **/
function updateDisplay(isBlogger) {
    const box = document.getElementById('gh-master-container');
    const p = gh_posts_data[gh_current_idx];
    if(!p) return;

    let titleText = isBlogger ? p.title.$t : p.title.rendered;
    let featuredImg = "";

    if (isBlogger) {
        if (p.media$thumbnail) {
            // Convert small thumbnail to high resolution
            featuredImg = p.media$thumbnail.url.replace(/\/s[0-9]+(-c)?\//, '/s1600/');
        } else if (p.content && p.content.$t.includes("<img")) {
            const m = p.content.$t.match(/<img.*?src="(.*?)"/);
            featuredImg = m ? m[1] : '';
        }
    } else {
        featuredImg = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';
    }

    imgState = { x: 0, y: 0, scale: 1 };
    document.getElementById('imgZoom').value = 1;

    box.innerHTML = `
        <div class="gh-master-wrap">
            <img src="https://images.weserv.nl/?url=${encodeURIComponent(SITE_LOGO_URL.replace('https://',''))}" class="gh-logo-watermark">
            <div class="gh-img-frame">
                <img src="https://images.weserv.nl/?url=${encodeURIComponent(featuredImg.replace('https://',''))}" class="draggable-img" id="mainImg">
                <div class="gh-red-overlay">
                    <div class="gh-small-ribbon">${SITE_DOMAIN}</div>
                </div>
                <div class="gh-social-icons">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
                    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
                </div>
            </div>
            <div class="gh-headline">${titleText}</div>
        </div>
        <div class="gh-nav-row">
            <button class="gh-nav-btn" onclick="move(-1)" ${gh_current_idx === 0 ? 'disabled' : ''}>← अघिल्लो</button>
            <button class="gh-nav-btn" onclick="move(1)" ${gh_current_idx === gh_posts_data.length - 1 ? 'disabled' : ''}>अर्को →</button>
        </div>
    `;

    const imgEl = document.getElementById('mainImg');
    imgEl.onload = () => { initDraggable(); adjustScale(); adjustFontSize(); };
}

/** Multi-Function: Extra Features (FontSize, Scale, Drag) **/
function adjustFontSize() {
    const h = document.querySelector('.gh-headline');
    if(!h) return;
    const len = h.innerText.length;
    h.style.fontSize = len < 40 ? "72px" : len < 70 ? "58px" : "45px";
}

function applyTransform() {
    const img = document.querySelector('.draggable-img');
    if(!img) return;
    imgState.scale = document.getElementById('imgZoom').value;
    img.style.transform = `translate(${imgState.x}px, ${imgState.y}px) scale(${imgState.scale})`;
}

function initDraggable() {
    interact('.draggable-img').draggable({
        listeners: { move(e) { imgState.x += e.dx; imgState.y += e.dy; applyTransform(); } }
    });
}

function changeFormat() {
    const sel = document.getElementById('formatSelector');
    const opt = sel.options[sel.selectedIndex];
    const wrap = document.querySelector('.gh-master-wrap');
    if(wrap) {
        wrap.style.width = opt.getAttribute('data-w') + 'px';
        wrap.style.height = opt.getAttribute('data-h') + 'px';
        adjustScale();
    }
}

function adjustScale() {
    const container = document.getElementById('gh-master-container');
    const wrap = document.querySelector('.gh-master-wrap');
    if(!wrap) return;
    const scale = Math.min((window.innerWidth - 40) / 1200, 1);
    container.style.transform = `scale(${scale})`;
    container.style.marginBottom = `-${630 * (1 - scale)}px`;
}

async function capturePNG() {
    const container = document.getElementById('gh-master-container');
    const target = document.querySelector('.gh-master-wrap');
    const originalTransform = container.style.transform;
    window.scrollTo(0,0);
    container.style.transform = "scale(1)";
    setTimeout(async () => {
        const canvas = await html2canvas(target, { useCORS: true, scale: 2 });
        const link = document.createElement('a');
        link.download = `BirgunjNews-${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
        container.style.transform = originalTransform;
    }, 500);
}

window.move = (n) => { gh_current_idx += n; updateSettings(); };
window.addEventListener('resize', adjustScale);

// Initial Execution
updateSettings();
</script>

</body>
</html>
